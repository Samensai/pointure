<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#2d54cf" />
  <title>Pointure</title>
  <link rel="manifest" href="/pointure/public/manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/pointure/src/ui/glass.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <script src="/pointure/src/data/paintData.js"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    function LG({ children, r = 26, style = {}, innerStyle = {} }) {
      return (
        <div className="lg-wrap" style={{ '--r': r + 'px', ...style }}>
          <div className="lg-inner" style={innerStyle}>
            <div className="lg-content">{children}</div>
          </div>
        </div>
      );
    }

    function PaintBlob({ color, size = 44, active, onClick }) {
      const [ripples, setRipples] = useState([]);

      const fire = () => {
        const id = Date.now();
        setRipples(r => [...r, id]);
        setTimeout(() => setRipples(r => r.filter(x => x !== id)), 700);
        if (onClick) onClick();
      };

      return (
        <button
          onClick={fire}
          style={{
            width: size,
            height: size,
            borderRadius: '50%',
            position: 'relative',
            overflow: 'hidden',
            cursor: 'pointer',
            outline: 'none',
            flexShrink: 0,
            background: 'linear-gradient(148deg,rgba(255,255,255,.6) 0%,rgba(255,255,255,.1) 50%,rgba(255,255,255,.25) 100%)',
            padding: '1.5px',
            boxShadow: active
              ? `0 0 0 3px rgba(255,255,255,.35), 0 6px 24px ${color}99, 0 2px 8px rgba(0,0,0,.4)`
              : `0 4px 18px ${color}66, 0 2px 6px rgba(0,0,0,.35)`,
            transform: active ? 'scale(1.08)' : 'scale(1)',
            transition: 'transform .18s, box-shadow .18s',
            border: 'none',
          }}
        >
          <div
            style={{
              position: 'absolute',
              inset: '1.5px',
              borderRadius: '50%',
              background: `radial-gradient(circle at 40% 38%, ${color}ff 0%, ${color}cc 55%, ${color}88 100%)`,
              animation: 'paintBob 3.5s ease-in-out infinite',
            }}
          />
          <div
            style={{
              position: 'absolute',
              top: '6%',
              left: '10%',
              width: '55%',
              height: '45%',
              borderRadius: '60% 40% 50% 60%',
              background: 'rgba(255,255,255,.38)',
              filter: 'blur(3px)',
              pointerEvents: 'none',
            }}
          />
          {ripples.map(id => (
            <div
              key={id}
              style={{
                position: 'absolute',
                top: '50%',
                left: '50%',
                width: size * .4,
                height: size * .4,
                marginLeft: -size * .2,
                marginTop: -size * .2,
                borderRadius: '50%',
                background: 'rgba(255,255,255,.45)',
                animation: 'ripple .7s ease-out forwards',
                pointerEvents: 'none',
              }}
            />
          ))}
        </button>
      );
    }

    function GlassSlider({ value, onChange, min = 0, max = 100, label, unit = '%', accent }) {
      const pct = ((value - min) / (max - min)) * 100;
      const grad = accent || 'rgba(200,180,255,1)';

      return (
        <div>
          {label && (
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10 }}>
              <span style={{ color: 'rgba(255,255,255,.6)', fontSize: 13, fontWeight: 500 }}>{label}</span>
              <span style={{ color: 'white', fontSize: 13, fontWeight: 700 }}>{value}{unit}</span>
            </div>
          )}
          <div style={{ position: 'relative', height: 22, display: 'flex', alignItems: 'center' }}>
            <div className="slider-track" style={{ width: '100%', position: 'relative' }}>
              <div
                className="slider-fill"
                style={{
                  width: `${pct}%`,
                  background: `linear-gradient(90deg,rgba(80,60,200,.7),${grad})`,
                  boxShadow: `0 0 10px ${grad}77`,
                }}
              />
              <div className="slider-thumb" style={{ left: `${pct}%` }} />
            </div>
            <input
              type="range"
              min={min}
              max={max}
              value={value}
              onChange={e => onChange(Number(e.target.value))}
              style={{ position: 'absolute', inset: 0, width: '100%' }}
            />
          </div>
        </div>
      );
    }

    function ActionButton({ label, sublabel, onClick, danger = false }) {
      return (
        <LG r={18}>
          <button
            onClick={onClick}
            style={{
              width: '100%',
              padding: '19px 18px',
              border: 'none',
              background: danger
                ? 'linear-gradient(135deg,rgba(154,34,68,.44),rgba(230,90,130,.14) 38%,rgba(48,16,30,.2) 100%)'
                : 'linear-gradient(135deg,rgba(170,214,255,.18),rgba(86,126,255,.24) 34%,rgba(18,40,122,.2) 100%)',
              color: 'white',
              cursor: 'pointer',
              textAlign: 'left',
              borderRadius: 17,
              boxShadow: danger
                ? 'inset 0 1px 0 rgba(255,255,255,.18), inset 0 -24px 34px rgba(72,0,18,.2)'
                : 'inset 0 1px 0 rgba(255,255,255,.22), inset 0 -24px 34px rgba(14,32,108,.24)',
            }}
          >
            <div style={{ fontSize: 16, fontWeight: 700, letterSpacing: -.2, textShadow: '0 2px 10px rgba(8,18,54,.35)' }}>{label}</div>
            {sublabel && (
              <div style={{ marginTop: 7, color: 'rgba(245,249,255,.82)', textShadow: '0 1px 8px rgba(8,18,54,.28)', fontSize: 12, lineHeight: 1.45 }}>
                {sublabel}
              </div>
            )}
          </button>
        </LG>
      );
    }

    function OverlayArtwork({ image, opacity, zoom, rotation, mirror, grid, fullscreen = false }) {
      const overlayTransform = [
        `scale(${zoom / 100})`,
        `rotate(${rotation}deg)`,
        mirror ? 'scaleX(-1)' : '',
      ].filter(Boolean).join(' ');

      return (
        <div
          style={{
            position: 'relative',
            height: '100%',
            minHeight: fullscreen ? 0 : 360,
            borderRadius: fullscreen ? 0 : 26,
            overflow: 'hidden',
            background: fullscreen
              ? '#000'
              : 'linear-gradient(160deg,rgba(205,225,255,.24) 0%,rgba(65,98,234,.22) 28%,rgba(15,18,78,.82) 62%,rgba(6,10,32,.94) 100%)',
          }}
        >
          {grid && [33, 66].map(p => (
            <div key={`gv-${p}`} style={{ position: 'absolute', top: `${p}%`, left: 0, right: 0, borderTop: '1px solid rgba(255,255,255,.12)', zIndex: 3 }} />
          ))}
          {grid && [33, 66].map(p => (
            <div key={`gh-${p}`} style={{ position: 'absolute', left: `${p}%`, top: 0, bottom: 0, borderLeft: '1px solid rgba(255,255,255,.12)', zIndex: 3 }} />
          ))}

          <div
            style={{
              position: 'absolute',
              inset: 0,
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              padding: fullscreen ? '5vh 4vw' : 24,
              zIndex: 2,
              pointerEvents: 'none',
            }}
          >
            <img
              src={image}
              alt="calque"
              style={{
                maxWidth: '100%',
                maxHeight: '100%',
                objectFit: 'contain',
                transform: overlayTransform,
                transformOrigin: 'center',
                opacity: opacity / 100,
                transition: 'opacity .12s, transform .18s',
                filter: fullscreen ? 'drop-shadow(0 20px 40px rgba(0,0,0,.45))' : 'drop-shadow(0 20px 30px rgba(10,8,40,.32))',
              }}
            />
          </div>

          {!fullscreen && (
            <>
              <div
                style={{
                  position: 'absolute',
                  inset: 0,
                  background: 'radial-gradient(circle at 50% 24%,rgba(255,255,255,.12),transparent 48%)',
                  zIndex: 1,
                }}
              />
              <div style={{ position: 'absolute', left: 18, right: 18, bottom: 18, zIndex: 4 }}>
                <LG r={16} innerStyle={{ padding: '10px 12px' }}>
                  <div style={{ color: 'rgba(255,255,255,.74)', fontSize: 12, lineHeight: 1.4 }}>
                    Apercu du calque. Regle-le ici, puis ouvre l'appareil photo quand tu es pret.
                  </div>
                </LG>
              </div>
            </>
          )}
        </div>
      );
    }

    function CameraOverlay({ image, opacity, zoom, rotation, mirror, grid, setZoom, onClose }) {
      const videoRef = useRef(null);
      const streamRef = useRef(null);
      const viewfinderRef = useRef(null);
      const [cameraReady, setCameraReady] = useState(false);
      const [cameraError, setCameraError] = useState('');

      useEffect(() => {
        let mounted = true;

        async function startCamera() {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: {
                facingMode: { ideal: 'environment' },
                width: { ideal: 1920 },
                height: { ideal: 1080 },
              },
              audio: false,
            });

            if (!mounted) {
              stream.getTracks().forEach(track => track.stop());
              return;
            }

            streamRef.current = stream;
            if (videoRef.current) {
              videoRef.current.srcObject = stream;
              videoRef.current.play().catch(() => {});
            }
            setCameraReady(true);
          } catch (error) {
            setCameraError("Impossible d'acceder a l'appareil photo. Verifie les autorisations du navigateur.");
          }
        }

        startCamera();

        return () => {
          mounted = false;
          streamRef.current?.getTracks().forEach(track => track.stop());
          if (videoRef.current) videoRef.current.srcObject = null;
        };
      }, []);

      useEffect(() => {
        const el = viewfinderRef.current;
        if (!el) return;

        let initialDist = null;
        let initialZoom = zoom;

        const onTouchStart = event => {
          if (event.touches.length === 2) {
            initialDist = Math.hypot(
              event.touches[0].clientX - event.touches[1].clientX,
              event.touches[0].clientY - event.touches[1].clientY
            );
            initialZoom = zoom;
          }
        };

        const onTouchMove = event => {
          if (event.touches.length === 2 && initialDist) {
            const dist = Math.hypot(
              event.touches[0].clientX - event.touches[1].clientX,
              event.touches[0].clientY - event.touches[1].clientY
            );
            const next = Math.round(Math.min(200, Math.max(40, initialZoom * (dist / initialDist))));
            setZoom(next);
          }
        };

        const onTouchEnd = () => {
          initialDist = null;
        };

        el.addEventListener('touchstart', onTouchStart, { passive: true });
        el.addEventListener('touchmove', onTouchMove, { passive: true });
        el.addEventListener('touchend', onTouchEnd, { passive: true });

        return () => {
          el.removeEventListener('touchstart', onTouchStart);
          el.removeEventListener('touchmove', onTouchMove);
          el.removeEventListener('touchend', onTouchEnd);
        };
      }, [zoom, setZoom]);

      return (
        <div style={{ position: 'fixed', inset: 0, zIndex: 30, background: '#000' }}>
          <div ref={viewfinderRef} style={{ position: 'absolute', inset: 0, overflow: 'hidden' }}>
            <video
              ref={videoRef}
              playsInline
              muted
              autoPlay
              style={{
                position: 'absolute',
                inset: 0,
                width: '100%',
                height: '100%',
                objectFit: 'cover',
                zIndex: 1,
                transform: 'translateZ(0)',
                WebkitTransform: 'translateZ(0)',
              }}
            />

            {!cameraReady && !cameraError && (
              <div
                style={{
                  position: 'absolute',
                  inset: 0,
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  color: 'rgba(255,255,255,.68)',
                  fontSize: 14,
                  zIndex: 3,
                }}
              >
                Ouverture de l'appareil photo...
              </div>
            )}

            <OverlayArtwork
              image={image}
              opacity={opacity}
              zoom={zoom}
              rotation={rotation}
              mirror={mirror}
              grid={grid}
              fullscreen
            />

            {cameraError && (
              <div style={{ position: 'absolute', left: 16, right: 16, bottom: 24, zIndex: 4 }}>
                <LG r={18} innerStyle={{ padding: '14px 16px' }}>
                  <div style={{ color: 'white', fontSize: 14, fontWeight: 600, marginBottom: 6 }}>Camera indisponible</div>
                  <div style={{ color: 'rgba(255,255,255,.68)', fontSize: 12, lineHeight: 1.5 }}>{cameraError}</div>
                </LG>
              </div>
            )}
          </div>

          <button
            onClick={onClose}
            aria-label="Retour"
            style={{
              position: 'absolute',
              top: 'calc(env(safe-area-inset-top, 0px) + 14px)',
              left: 14,
              width: 46,
              height: 46,
              borderRadius: '50%',
              border: '1px solid rgba(255,255,255,.18)',
              background: 'rgba(10,10,20,.42)',
              color: 'white',
              cursor: 'pointer',
              zIndex: 5,
              fontSize: 24,
              lineHeight: 1,
              backdropFilter: 'blur(20px)',
              WebkitBackdropFilter: 'blur(20px)',
            }}
          >
            ←
          </button>
        </div>
      );
    }

    function TabCalque({
      image,
      opacity,
      setOpacity,
      zoom,
      setZoom,
      rotation,
      setRotation,
      mirror,
      setMirror,
      grid,
      setGrid,
      onImportImage,
      onOpenLibrary,
      onRemoveImage,
      onOpenCamera,
    }) {
      const fileRef = useRef(null);

      const handleImageImport = event => {
        const file = event.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = loadEvent => onImportImage(loadEvent.target.result);
        reader.readAsDataURL(file);
        event.target.value = '';
      };

      return (
        <div className="screen" style={{ height: '100%', display: 'flex', flexDirection: 'column', gap: 12, padding: '12px 16px 0', overflowY: 'auto' }}>
          {!image ? (
            <>
              <LG r={28} innerStyle={{ padding: '28px 22px' }}>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  <div style={{ color: 'rgba(240,247,255,.64)', fontSize: 11, fontWeight: 700, letterSpacing: 2.8, textTransform: 'uppercase' }}>
                    Ecran d'accueil
                  </div>
                  <div style={{ color: 'white', fontSize: 30, lineHeight: 1.02, fontWeight: 800, letterSpacing: -1.1, textShadow: '0 8px 24px rgba(140,190,255,.24)' }}>
                    Choisis d'abord ton modele.
                  </div>
                  <div style={{ color: 'rgba(245,249,255,.68)', fontSize: 14, lineHeight: 1.6 }}>
                    Importe un calque depuis ta galerie ou va chercher une inspiration dans la bibliotheque avant d'ouvrir la camera.
                  </div>
                </div>
              </LG>

              <div style={{ display: 'grid', gap: 10 }}>
                <ActionButton
                  label="Importer un modele"
                  sublabel="Choisir une image depuis l'appareil ou la galerie."
                  onClick={() => fileRef.current?.click()}
                />
                <ActionButton
                  label="Chercher des inspirations"
                  sublabel="Ouvrir la bibliotheque puis revenir avec une reference."
                  onClick={onOpenLibrary}
                />
              </div>
            </>
          ) : (
            <>
              <LG r={26} style={{ flexShrink: 0 }} innerStyle={{ padding: 0 }}>
                <div style={{ padding: 12 }}>
                  <div style={{ aspectRatio: '4 / 5' }}>
                    <OverlayArtwork
                      image={image}
                      opacity={opacity}
                      zoom={zoom}
                      rotation={rotation}
                      mirror={mirror}
                      grid={grid}
                    />
                  </div>
                </div>
              </LG>

              <ActionButton
                label="Supprimer"
                sublabel="Retirer ce calque et revenir a l'accueil."
                onClick={onRemoveImage}
                danger
              />

              <LG r={24} innerStyle={{ padding: '18px 16px' }}>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                  <GlassSlider value={opacity} onChange={setOpacity} label="Opacite du calque" accent="rgba(160,140,255,1)" />
                  <GlassSlider value={zoom} onChange={setZoom} min={40} max={200} label="Zoom" unit="%" accent="rgba(100,200,255,1)" />
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, minmax(0, 1fr))', gap: 8 }}>
                    <LG r={14}>
                      <button onClick={() => setRotation(value => (value + 90) % 360)} style={{ width: '100%', padding: '10px 0', background: 'linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.01))', border: 'none', cursor: 'pointer', textAlign: 'center', color: 'white', borderRadius: 13 }}>
                        <div style={{ fontSize: 17, marginBottom: 2 }}>↻</div>
                        <div style={{ color: 'rgba(255,255,255,.45)', fontSize: 10, fontWeight: 500 }}>Rotation</div>
                      </button>
                    </LG>
                    <LG r={14}>
                      <button onClick={() => setGrid(value => !value)} style={{ width: '100%', padding: '10px 0', background: 'linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.01))', border: 'none', cursor: 'pointer', textAlign: 'center', color: grid ? '#aef6d3' : 'white', borderRadius: 13 }}>
                        <div style={{ fontSize: 17, marginBottom: 2 }}>⊞</div>
                        <div style={{ color: grid ? '#aef6d3' : 'rgba(255,255,255,.45)', fontSize: 10, fontWeight: 500 }}>Grille</div>
                      </button>
                    </LG>
                    <LG r={14}>
                      <button onClick={() => setMirror(value => !value)} style={{ width: '100%', padding: '10px 0', background: 'linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.01))', border: 'none', cursor: 'pointer', textAlign: 'center', color: mirror ? '#aef6d3' : 'white', borderRadius: 13 }}>
                        <div style={{ fontSize: 17, marginBottom: 2 }}>⇋</div>
                        <div style={{ color: mirror ? '#aef6d3' : 'rgba(255,255,255,.45)', fontSize: 10, fontWeight: 500 }}>Miroir</div>
                      </button>
                    </LG>
                  </div>
                  <ActionButton
                    label="Ouvrir dans l'appareil photo"
                    sublabel="Passe en plein ecran avec le calque par-dessus."
                    onClick={onOpenCamera}
                  />
                </div>
              </LG>
            </>
          )}

          <input
            ref={fileRef}
            type="file"
            accept="image/*"
            style={{ display: 'none' }}
            onChange={handleImageImport}
          />
          <div style={{ height: 12 }} />
        </div>
      );
    }

    const PAINT_DATA = window.PAINT_DATA || { pigments: {}, brands: [], defaultPaintIds: [] };

    function hexToRgb(hex) {
      return [parseInt(hex.slice(1, 3), 16), parseInt(hex.slice(3, 5), 16), parseInt(hex.slice(5, 7), 16)];
    }

    function rgbToHex(rgb) {
      const [r, g, b] = rgb;
      const toHex = value => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    function srgbToLinear(channel) {
      const value = channel / 255;
      return value <= 0.04045 ? value / 12.92 : ((value + 0.055) / 1.055) ** 2.4;
    }

    function linearToSrgb(value) {
      const clamped = Math.max(0, Math.min(1, value));
      return clamped <= 0.0031308 ? clamped * 12.92 : 1.055 * (clamped ** (1 / 2.4)) - 0.055;
    }

    function hexToLinearRgb(hex) {
      return hexToRgb(hex).map(srgbToLinear);
    }

    function linearRgbToHex(rgb) {
      return rgbToHex(rgb.map(channel => linearToSrgb(channel) * 255));
    }

    function reflectanceToKS(reflectance) {
      const safe = Math.max(0.0001, Math.min(0.9999, reflectance));
      return ((1 - safe) ** 2) / (2 * safe);
    }

    function ksToReflectance(ks) {
      return 1 + ks - Math.sqrt((ks * ks) + (2 * ks));
    }

    function hexToOklab(hex) {
      const [r, g, b] = hexToLinearRgb(hex);
      const l = 0.4122214708 * r + 0.5363325363 * g + 0.0514459929 * b;
      const m = 0.2119034982 * r + 0.6806995451 * g + 0.1073969566 * b;
      const s = 0.0883024619 * r + 0.2817188376 * g + 0.6299787005 * b;

      const lRoot = Math.cbrt(l);
      const mRoot = Math.cbrt(m);
      const sRoot = Math.cbrt(s);

      return [
        0.2104542553 * lRoot + 0.7936177850 * mRoot - 0.0040720468 * sRoot,
        1.9779984951 * lRoot - 2.4285922050 * mRoot + 0.4505937099 * sRoot,
        0.0259040371 * lRoot + 0.7827717662 * mRoot - 0.8086757660 * sRoot,
      ];
    }

    function oklabDistance(hexA, hexB) {
      const [l1, a1, b1] = hexToOklab(hexA);
      const [l2, a2, b2] = hexToOklab(hexB);
      return Math.sqrt((l1 - l2) ** 2 + (a1 - a2) ** 2 + (b1 - b2) ** 2);
    }

    function buildPaintColor(pigments, pigmentMap) {
      if (!pigments.length) return '#808080';
      if (pigments.length === 1) return pigmentMap[pigments[0]]?.hex || '#808080';

      const rgb = pigments
        .map(code => pigmentMap[code]?.hex)
        .filter(Boolean)
        .map(hexToLinearRgb);

      if (!rgb.length) return '#808080';

      const average = [0, 1, 2].map(index => rgb.reduce((sum, item) => sum + item[index], 0) / rgb.length);
      return linearRgbToHex(average);
    }

    function expandPaintLibrary() {
      const pigmentMap = PAINT_DATA.pigments || {};
      const paints = [];

      (PAINT_DATA.brands || []).forEach(brand => {
        brand.colors.forEach(color => {
          const pigmentEntries = color.pigments
            .map(code => ({ code, ...pigmentMap[code] }))
            .filter(entry => entry.name);

          const opacityScore = pigmentEntries.length
            ? pigmentEntries.reduce((sum, pigment) => sum + (pigment.opacity ?? 0.6), 0) / pigmentEntries.length
            : 0.6;

          const tintStrength = pigmentEntries.length
            ? pigmentEntries.reduce((sum, pigment) => sum + (pigment.tintStrength ?? 0.6), 0) / pigmentEntries.length
            : 0.6;

          paints.push({
            id: color.id,
            brandId: brand.id,
            brandName: brand.name,
            range: brand.range,
            name: color.name,
            pigments: color.pigments,
            pigmentLabel: color.pigments.join(', '),
            shade: color.shade,
            opacityLabel: color.opacity,
            color: color.hex || buildPaintColor(color.pigments, pigmentMap),
            opacityScore,
            tintStrength,
          });
        });
      });

      return paints;
    }

    const PAINT_LIBRARY = expandPaintLibrary();
    const DEFAULT_PAINTS = PAINT_DATA.defaultPaintIds
      .map(id => PAINT_LIBRARY.find(paint => paint.id === id))
      .filter(Boolean);

    function mixPaints(parts) {
      const active = parts.filter(part => part.ratio > 0);
      if (!active.length) return '#444444';

      const total = active.reduce((sum, part) => sum + part.ratio, 0);
      const mixedKS = [0, 0, 0];

      active.forEach(part => {
        const weight = part.ratio / total;
        const pigmentInfluence = 0.65 + (part.tintStrength * 0.35);
        const bodyInfluence = 0.75 + (part.opacityScore * 0.25);
        const effectiveWeight = weight * pigmentInfluence * bodyInfluence;
        const linear = hexToLinearRgb(part.color);

        linear.forEach((channel, index) => {
          mixedKS[index] += reflectanceToKS(channel) * effectiveWeight;
        });
      });

      const reflectance = mixedKS.map(ksToReflectance);
      return linearRgbToHex(reflectance);
    }

    function buildSuggestedMix(targetColor, paints) {
      if (!targetColor || paints.length === 0) return null;

      let best = null;

      const registerCandidate = parts => {
        const normalized = parts.filter(part => part.ratio > 0);
        if (!normalized.length) return;
        const mixed = mixPaints(normalized);
        const distance = oklabDistance(targetColor, mixed);

        if (!best || distance < best.distance) {
          best = { parts: normalized, mixed, distance };
        }
      };

      paints.forEach(paint => registerCandidate([{ ...paint, ratio: 100 }]));

      for (let i = 0; i < paints.length; i += 1) {
        for (let j = i + 1; j < paints.length; j += 1) {
          for (let ratio = 10; ratio <= 90; ratio += 5) {
            registerCandidate([
              { ...paints[i], ratio: 100 - ratio },
              { ...paints[j], ratio },
            ]);
          }
        }
      }

      if (paints.length >= 3) {
        for (let i = 0; i < paints.length; i += 1) {
          for (let j = i + 1; j < paints.length; j += 1) {
            for (let k = j + 1; k < paints.length; k += 1) {
              for (let a = 20; a <= 60; a += 10) {
                for (let b = 15; b <= 60 - a; b += 5) {
                  const c = 100 - a - b;
                  if (c <= 0) continue;
                  registerCandidate([
                    { ...paints[i], ratio: a },
                    { ...paints[j], ratio: b },
                    { ...paints[k], ratio: c },
                  ]);
                }
              }
            }
          }
        }
      }

      if (!best) return null;

      return {
        ...best,
        proximity: Math.max(0, Math.min(100, Math.round((1 - (best.distance / 0.42)) * 100))),
      };
    }

    function ColorSamplerOverlay({ image, currentColor, onClose, onConfirm }) {
      const imgRef = useRef(null);
      const canvasRef = useRef(null);
      const [draftColor, setDraftColor] = useState(currentColor || '#ffffff');
      const [marker, setMarker] = useState(null);

      useEffect(() => {
        setDraftColor(currentColor || '#ffffff');
      }, [currentColor]);

      const sampleColor = event => {
        const rect = imgRef.current?.getBoundingClientRect();
        const img = imgRef.current;
        if (!rect || !img) return;

        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        if (x < 0 || y < 0 || x > rect.width || y > rect.height) return;

        const canvas = canvasRef.current || document.createElement('canvas');
        canvasRef.current = canvas;
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;

        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        if (!ctx) return;
        ctx.drawImage(img, 0, 0, img.naturalWidth, img.naturalHeight);

        const px = Math.max(0, Math.min(img.naturalWidth - 1, Math.round((x / rect.width) * img.naturalWidth)));
        const py = Math.max(0, Math.min(img.naturalHeight - 1, Math.round((y / rect.height) * img.naturalHeight)));
        const data = ctx.getImageData(px, py, 1, 1).data;
        const nextColor = rgbToHex([data[0], data[1], data[2]]);

        setDraftColor(nextColor);
        setMarker({ xPct: (x / rect.width) * 100, yPct: (y / rect.height) * 100 });
      };

      return (
        <div style={{ position: 'fixed', inset: 0, zIndex: 35, background: 'rgba(2,6,18,.88)', backdropFilter: 'blur(18px)', WebkitBackdropFilter: 'blur(18px)' }}>
          <div style={{ position: 'absolute', top: 'calc(env(safe-area-inset-top, 0px) + 14px)', left: 14, right: 14, display: 'flex', justifyContent: 'space-between', zIndex: 3 }}>

              </div>
            </LG>

    function buildReferencePoster(ref) {
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200">
          <defs>
            <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="${ref.palette[0]}" />
              <stop offset="100%" stop-color="${ref.palette[ref.palette.length - 1]}" />
            </linearGradient>
          </defs>
          <rect width="900" height="1200" fill="url(#bg)" />
          <rect x="74" y="74" width="752" height="1052" rx="42" fill="rgba(8,10,24,0.24)" stroke="rgba(255,255,255,0.28)" />
          <circle cx="250" cy="280" r="170" fill="${ref.palette[1]}" opacity="0.82" />
          <circle cx="590" cy="390" r="200" fill="${ref.palette[2]}" opacity="0.8" />
          <circle cx="430" cy="700" r="245" fill="${ref.palette[3]}" opacity="0.72" />
          <circle cx="685" cy="820" r="165" fill="${ref.palette[4]}" opacity="0.8" />
          <text x="110" y="980" fill="white" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800">${ref.title}</text>
          <text x="110" y="1048" fill="rgba(255,255,255,0.82)" font-family="Inter, Arial, sans-serif" font-size="38">${ref.artist}</text>
        </svg>
      `;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function buildCommonsThumb(url, width = 640) {
      const prefix = 'https://commons.wikimedia.org/wiki/Special:FilePath/';
      if (!url || !url.startsWith(prefix)) return url;
      const fileName = url.slice(prefix.length);
      return `https://commons.wikimedia.org/wiki/Special:Redirect/file/${fileName}?width=${width}`;
    }

    function getLibraryImageUrl(ref) {
      if (!ref.imageUrl) return buildReferencePoster(ref);
      if (ref.thumbnailUrl) return ref.thumbnailUrl;
      if (ref.imageUrl.includes('commons.wikimedia.org/wiki/Special:FilePath/')) {
        return buildCommonsThumb(ref.imageUrl, 720);
      }
      return ref.imageUrl;
    }

    function getReferenceAsset(ref) {
      if (!ref.imageUrl) return buildReferencePoster(ref);
      if (ref.referenceUrl) return ref.referenceUrl;
      if (ref.imageUrl.includes('commons.wikimedia.org/wiki/Special:FilePath/')) {
        return buildCommonsThumb(ref.imageUrl, 1600);
      }
      return ref.imageUrl;
    }

    function ReferenceCardImage({ refItem }) {
      const [visible, setVisible] = useState(false);
      const [failed, setFailed] = useState(false);
      const hostRef = useRef(null);

      useEffect(() => {
        const node = hostRef.current;
        if (!node || visible) return;
        const observer = new IntersectionObserver(
          entries => {
            if (entries.some(entry => entry.isIntersecting)) {
              setVisible(true);
              observer.disconnect();
            }
          },
          { rootMargin: '220px 0px' }
        );
        observer.observe(node);
        return () => observer.disconnect();
      }, [visible]);

      const poster = buildReferencePoster(refItem);
      const displayUrl = failed ? poster : getLibraryImageUrl(refItem);

      return (
        <div ref={hostRef} style={{ height: 110, borderRadius: '19px 19px 0 0', overflow: 'hidden', position: 'relative', background: '#15214a' }}>
          {visible ? (
            <img
              src={displayUrl}
              alt={refItem.title}
              loading="lazy"
              decoding="async"
              fetchPriority="low"
              onError={() => setFailed(true)}
              style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }}
            />
          ) : (
            <div style={{ width: '100%', height: '100%', background: `linear-gradient(135deg, ${refItem.palette[0]}, ${refItem.palette[3]})` }} />
          )}
          <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(180deg,transparent 35%,rgba(5,2,30,.68) 100%)' }} />
          {failed && (
            <div style={{ position: 'absolute', top: 8, right: 8, padding: '4px 8px', borderRadius: 999, background: 'rgba(6,12,34,.56)', border: '1px solid rgba(255,255,255,.16)', color: 'rgba(255,255,255,.76)', fontSize: 9, fontWeight: 700, letterSpacing: .5, textTransform: 'uppercase' }}>
              Apercu
            </div>
          )}
        </div>
      );
    }

    function TabBibliotheque({ onUseReference }) {
      const [q, setQ] = useState('');
      const [active, setActive] = useState(null);
      const [difficulty, setDifficulty] = useState('tous');
      const filtered = REFS.filter(r =>
        (difficulty === 'tous' || r.difficulty === difficulty) &&
        (
          !q ||
          r.title.toLowerCase().includes(q.toLowerCase()) ||
          r.artist.toLowerCase().includes(q.toLowerCase()) ||
          r.tags.some(t => t.includes(q.toLowerCase()))
        )
      );

      const difficulties = [
        { id: 'tous', label: 'Tous' },
        { id: 'debutant', label: 'Debutant' },
        { id: 'intermediaire', label: 'Intermediaire' },
        { id: 'avance', label: 'Avance' },
      ];

      return (
        <div className="screen" style={{ height: '100%', display: 'flex', flexDirection: 'column', gap: 10, padding: '12px 16px 0', overflowX: 'hidden' }}>
          <LG r={18} innerStyle={{ padding: '11px 14px', display: 'flex', alignItems: 'center', gap: 9 }}>
            <svg width="15" height="15" fill="none" stroke="rgba(255,255,255,.45)" strokeWidth="2" strokeLinecap="round"><circle cx="6.5" cy="6.5" r="4.5" /><path d="M11 11l3 3" /></svg>
            <input
              value={q}
              onChange={e => setQ(e.target.value)}
              placeholder="Rechercher oeuvres, artistes..."
              style={{ flex: 1, background: 'none', border: 'none', outline: 'none', color: 'white', fontSize: 16, fontFamily: 'inherit' }}
            />
            {q && <button onClick={() => setQ('')} style={{ background: 'none', border: 'none', color: 'rgba(255,255,255,.4)', cursor: 'pointer', fontSize: 18 }}>×</button>}
          </LG>

          <div style={{ display: 'flex', gap: 8, overflowX: 'auto', paddingBottom: 2 }}>
            {difficulties.map(item => (
              <LG key={item.id} r={16} style={{ flexShrink: 0 }}>
                <button
                  onClick={() => setDifficulty(item.id)}
                  style={{
                    border: 'none',
                    background: difficulty === item.id
                      ? 'linear-gradient(135deg,rgba(166,216,255,.24),rgba(77,122,255,.24))'
                      : 'rgba(255,255,255,.04)',
                    color: difficulty === item.id ? 'white' : 'rgba(255,255,255,.72)',
                    padding: '10px 14px',
                    borderRadius: 15,
                    fontSize: 12,
                    fontWeight: 700,
                    cursor: 'pointer',
                  }}
                >
                  {item.label}
                </button>
              </LG>
            ))}
          </div>

          <div style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', touchAction: 'pan-y' }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 9, paddingBottom: 14 }}>
              {filtered.map(ref => (
                <LG key={ref.id} r={20} style={{ cursor: 'pointer' }}>
                  <div onClick={() => setActive(active === ref.id ? null : ref.id)}>
                      <ReferenceCardImage refItem={ref} />
                    <div style={{ padding: '9px 11px' }}>
                      <div style={{ color: 'white', fontSize: 12, fontWeight: 700 }}>{ref.title}</div>
                      <div style={{ color: 'rgba(255,255,255,.45)', fontSize: 11, marginTop: 2 }}>{ref.artist}</div>
                      <div style={{ color: 'rgba(212,236,255,.72)', fontSize: 10, fontWeight: 700, marginTop: 5, textTransform: 'uppercase', letterSpacing: 1.3 }}>
                        {ref.difficulty}
                      </div>
                    </div>
                  </div>
                  {active === ref.id && (
                    <div style={{ padding: '0 11px 11px', borderTop: '1px solid rgba(255,255,255,.09)', paddingTop: 10 }}>
                      <div style={{ display: 'flex', gap: 5, marginBottom: 9 }}>
                        {ref.palette.map((c, i) => <PaintBlob key={i} color={c} size={26} />)}
                      </div>
                      <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap', marginBottom: 10 }}>
                        {ref.tags.map(t => (
                          <span key={t} style={{ padding: '3px 8px', borderRadius: 8, background: 'rgba(255,255,255,.09)', border: '1px solid rgba(255,255,255,.13)', color: 'rgba(255,255,255,.6)', fontSize: 10, fontWeight: 500 }}>{t}</span>
                        ))}
                      </div>
                      <div style={{ color: 'rgba(255,255,255,.55)', fontSize: 10, lineHeight: 1.45, marginBottom: 10 }}>
                        {ref.source} · {ref.rights}

                      <LG r={11} innerStyle={{ padding: '1px' }}>
                        <button
                          onClick={() => onUseReference(getReferenceAsset(ref))}
                          style={{ width: '100%', padding: '9px', borderRadius: 10, background: 'linear-gradient(135deg,rgba(100,80,220,.25),rgba(80,60,180,.15))', border: 'none', cursor: 'pointer', color: 'white', fontSize: 12, fontWeight: 600 }}

                      <a

                  borderRadius: 20,
                  background: 'linear-gradient(160deg,rgba(255,255,255,.18) 0%,rgba(255,255,255,.07) 100%)',
                  boxShadow: 'inset 0 1px 0 rgba(255,255,255,.45), inset 0 -10px 18px rgba(0,15,70,.18), 0 2px 12px rgba(0,0,30,.25)',
                  backdropFilter: 'blur(20px)',
                  WebkitBackdropFilter: 'blur(20px)',
                  transform: `translate3d(calc(${activeIdx} * (100% + 8px)), 0, 0)`,
                  transition: 'transform .52s cubic-bezier(0.22,1,0.36,1)',
                  willChange: 'transform',
                  pointerEvents: 'none',
                  zIndex: 0,
                }}
              />
              {tabs.map(t => (
                <button
                  key={t.id}
                  onClick={() => setTab(t.id)}
                  style={{
                    flex: 1,
                    display: 'flex',
                    flexDirection: 'column',
                    alignItems: 'center',
                    gap: 3,
                    padding: '8px 4px',
                    borderRadius: 20,
                    cursor: 'pointer',
                    border: 'none',
                    outline: 'none',
                    background: 'transparent',
                    color: tab === t.id ? 'white' : 'rgba(255,255,255,.38)',
                    transition: 'color .28s ease',
                    position: 'relative',
                    zIndex: 1,
                  }}
                >
                  <div style={{ transform: tab === t.id ? 'translateY(-1px) scale(1.1)' : 'translateY(0) scale(1)', transition: 'transform .42s cubic-bezier(0.22,1,0.36,1)' }}>
                    {t.svg}
                  </div>
                  <span style={{ fontSize: 10.5, fontWeight: tab === t.id ? 700 : 400, letterSpacing: .2 }}>{t.label}</span>
                </button>
              ))}
            </div>
          </LG>
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState('calque');
      const [overlayImage, setOverlayImage] = useState(() => {
        const saved = localStorage.getItem('pointure_overlay_image');
        return saved || null;
      });
      const [cameraMode, setCameraMode] = useState(false);
      const [opacity, setOpacity] = useState(65);
      const [zoom, setZoom] = useState(100);
      const [rotation, setRotation] = useState(0);
      const [mirror, setMirror] = useState(false);
      const [grid, setGrid] = useState(false);

      const switchTab = nextTab => {
        setTab(nextTab);
        localStorage.setItem('pointure_tab', nextTab);
      };

      const handleImportImage = image => {
        setOverlayImage(image);
        switchTab('calque');
      };

      const handleUseReference = image => {
        setOverlayImage(image);
        switchTab('calque');
      };

      const handleRemoveImage = () => {
        setOverlayImage(null);
        setCameraMode(false);
      };

      useEffect(() => {
        if (!overlayImage) {
          localStorage.removeItem('pointure_overlay_image');
          return;
        }
        if (typeof overlayImage === 'string' && !overlayImage.startsWith('data:')) {
          localStorage.setItem('pointure_overlay_image', overlayImage);
          return;
        }
        localStorage.removeItem('pointure_overlay_image');
      }, [overlayImage]);

      if (cameraMode && overlayImage) {
        return (
          <CameraOverlay
            image={overlayImage}
            opacity={opacity}
            zoom={zoom}
            rotation={rotation}
            mirror={mirror}
            grid={grid}
            setZoom={setZoom}
            onClose={() => setCameraMode(false)}
          />
        );
      }

      return (
        <div style={{ position: 'fixed', inset: 0, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
          <div style={{ position: 'fixed', inset: 0, zIndex: 0 }}>
            <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(180deg,#2d54cf 0%,#4a70de 16%,#6f8fe9 38%,#2d54cf 66%,#081230 100%)' }} />
            <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(circle at 15% 8%,rgba(255,255,255,.92),transparent 18%), radial-gradient(circle at 82% 12%,rgba(218,244,236,.76),transparent 18%), radial-gradient(circle at 55% 22%,rgba(162,188,255,.24),transparent 22%)' }} />
            <div style={{ position: 'absolute', inset: '-6% -8%', background: 'linear-gradient(132deg, transparent 0%, transparent 58%, rgba(255,255,255,.12) 61%, rgba(255,255,255,.82) 64%, rgba(222,244,214,.9) 66%, rgba(176,219,198,.82) 68%, rgba(255,255,255,.12) 71%, transparent 74%)', filter: 'blur(3px)', transform: 'rotate(-10deg) scale(1.08)', opacity: .98 }} />
            <div style={{ position: 'absolute', inset: '-8% -10%', background: 'repeating-linear-gradient(116deg, transparent 0 16px, rgba(255,255,255,.02) 16px 30px, rgba(255,255,255,.4) 30px 34px, rgba(234,247,210,.58) 34px 38px, rgba(255,255,255,.04) 38px 54px)', filter: 'blur(2px)', transform: 'translateX(18%) translateY(-6%) rotate(-8deg)', opacity: .8, clipPath: 'polygon(58% 0%, 100% 0%, 100% 46%, 72% 30%)' }} />
            <div style={{ position: 'absolute', inset: '-10% -8%', background: 'linear-gradient(118deg, transparent 0%, transparent 18%, rgba(255,255,255,.16) 21%, rgba(255,255,255,.72) 24%, rgba(176,214,255,.72) 28%, rgba(79,118,248,.96) 33%, rgba(31,58,186,.98) 39%, rgba(70,108,240,.94) 46%, rgba(175,226,255,.72) 51%, rgba(255,255,255,.5) 55%, rgba(255,255,255,.1) 58%, transparent 62%)', filter: 'blur(8px)', transform: 'rotate(-12deg) scale(1.14)', opacity: .98 }} />
            <div style={{ position: 'absolute', inset: '-8% -8%', background: 'linear-gradient(140deg, transparent 0%, transparent 54%, rgba(92,137,255,.18) 58%, rgba(31,63,202,.72) 64%, rgba(15,35,130,.92) 72%, rgba(68,106,240,.22) 80%, transparent 86%)', filter: 'blur(10px)', transform: 'rotate(-10deg) scale(1.08)', opacity: .92 }} />
            <div style={{ position: 'absolute', inset: '-8% -6%', background: 'radial-gradient(ellipse at 18% 100%, rgba(255,255,255,.16), transparent 34%), radial-gradient(ellipse at 74% 100%, rgba(44,108,255,.22), transparent 36%)', filter: 'blur(24px)', opacity: .82 }} />
            {[
              { w: 380, h: 260, t: -70, l: -60, c: 'rgba(255,255,255,.18)', d: '0s' },
              { w: 320, h: 220, t: '20%', r: -70, c: 'rgba(123,214,255,.18)', d: '4s' },
              { w: 240, h: 240, b: '8%', l: '18%', c: 'rgba(90,115,255,.18)', d: '8s' },
            ].map((b, i) => (
              <div
                key={i}
                style={{
                  position: 'absolute',
                  width: b.w,
                  height: b.h,
                  borderRadius: '50%',
                  background: b.c,
                  filter: 'blur(60px)',
                  opacity: .7,
                  top: b.t,
                  left: b.l,
                  right: b.r,
                  bottom: b.b,
                  animation: `blobDrift 10s ease-in-out ${b.d} infinite`,
                }}
              />
            ))}
          </div>

          <div style={{ position: 'relative', zIndex: 1, display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0, paddingTop: 'env(safe-area-inset-top,0px)' }}>
            <div style={{ padding: '12px 18px 8px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
              <div>
                <div style={{ color: 'rgba(245,249,255,.82)', textShadow: '0 1px 8px rgba(7,18,56,.3)', fontSize: 10, fontWeight: 700, letterSpacing: 2.9, textTransform: 'uppercase' }}>Application</div>
                <div style={{ color: 'white', fontSize: 29, fontWeight: 800, letterSpacing: -1, lineHeight: 1.05, textShadow: '0 8px 22px rgba(18,38,110,.3)' }}>Pointure</div>
              </div>
              <LG r={22} innerStyle={{ padding: '8px 14px' }}>
                <span style={{ color: 'rgba(255,255,255,.86)', fontSize: 13, fontWeight: 500, letterSpacing: '.02em' }}>v0.45 PWA</span>
              </LG>
            </div>

            <div style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', minHeight: 0, WebkitOverflowScrolling: 'touch' }}>
              {tab === 'calque' && (
                <TabCalque
                  image={overlayImage}
                  opacity={opacity}
                  setOpacity={setOpacity}
                  zoom={zoom}
                  setZoom={setZoom}
                  rotation={rotation}
                  setRotation={setRotation}
                  mirror={mirror}
                  setMirror={setMirror}
                  grid={grid}
                  setGrid={setGrid}
                  onImportImage={handleImportImage}
                  onOpenLibrary={() => switchTab('biblio')}
                  onRemoveImage={handleRemoveImage}
                  onOpenCamera={() => setCameraMode(true)}
                />
              )}
              {tab === 'couleurs' && <TabCouleurs overlayImage={overlayImage} />}
              {tab === 'biblio' && <TabBibliotheque onUseReference={handleUseReference} />}
            </div>

            <div
              style={{
                flexShrink: 0,
                borderTop: '1px solid rgba(255,255,255,0.06)',
                background: 'linear-gradient(180deg, rgba(17,32,108,.08) 0%, rgba(18,40,132,.36) 100%)',
              }}
            >
              <TabBar tab={tab} setTab={switchTab} />
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
