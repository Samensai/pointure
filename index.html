<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#e4eaf2" />
  <title>Pointure</title>
  <link rel="manifest" href="/pointure/public/manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/pointure/src/ui/neu.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <script src="/pointure/src/data/paintData.js"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    let _audioCtx = null;
    function feedback() {
      try { navigator.vibrate?.(8); } catch(e) {}
      try {
        if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const ctx = _audioCtx;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(1100, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(650, ctx.currentTime + 0.045);
        gain.gain.setValueAtTime(0.09, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.055);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.055);
      } catch(e) {}
    }

    function Neu({ children, r = 24, style = {}, innerStyle = {} }) {
      return (
        <div style={{
          background: 'var(--bg)',
          borderRadius: r,
          boxShadow: 'var(--shadow-raised)',
          ...innerStyle,
          ...style,
        }}>
          {children}
        </div>
      );
    }

    function PaintBlob({ color, size = 44, active, onClick }) {
      const [ripples, setRipples] = useState([]);

      const fire = () => {
        const id = Date.now();
        setRipples(r => [...r, id]);
        setTimeout(() => setRipples(r => r.filter(x => x !== id)), 700);
        if (onClick) onClick();
      };

      return (
        <button
          onClick={fire}
          style={{
            width: size,
            height: size,
            borderRadius: '50%',
            position: 'relative',
            overflow: 'hidden',
            cursor: 'pointer',
            outline: 'none',
            flexShrink: 0,
            background: 'linear-gradient(148deg,rgba(255,255,255,.6) 0%,rgba(255,255,255,.1) 50%,rgba(255,255,255,.25) 100%)',
            padding: '1.5px',
            boxShadow: active
              ? `0 0 0 3px rgba(255,255,255,.35), 0 6px 24px ${color}99, 0 2px 8px rgba(0,0,0,.4)`
              : `0 4px 18px ${color}66, 0 2px 6px rgba(0,0,0,.35)`,
            transform: active ? 'scale(1.08)' : 'scale(1)',
            transition: 'transform var(--motion-fast), box-shadow var(--motion-fast)',
            border: 'none',
          }}
        >
          <div
            style={{
              position: 'absolute',
              inset: '1.5px',
              borderRadius: '50%',
              background: `radial-gradient(circle at 40% 38%, ${color}ff 0%, ${color}cc 55%, ${color}88 100%)`,
              animation: 'paintBob 3.5s ease-in-out infinite',
            }}
          />
          <div
            style={{
              position: 'absolute',
              top: '6%',
              left: '10%',
              width: '55%',
              height: '45%',
              borderRadius: '60% 40% 50% 60%',
              background: 'rgba(255,255,255,.38)',
              filter: 'blur(3px)',
              pointerEvents: 'none',
            }}
          />
          {ripples.map(id => (
            <div
              key={id}
              style={{
                position: 'absolute',
                top: '50%',
                left: '50%',
                width: size * .4,
                height: size * .4,
                marginLeft: -size * .2,
                marginTop: -size * .2,
                borderRadius: '50%',
                background: 'rgba(255,255,255,.45)',
                animation: 'ripple .7s var(--motion-curve) forwards',
                pointerEvents: 'none',
              }}
            />
          ))}
        </button>
      );
    }

    function GlassSlider({ value, onChange, min = 0, max = 100, label, unit = '%' }) {
      const pct = ((value - min) / (max - min)) * 100;

      return (
        <div>
          {label && (
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10 }}>
              <span style={{ color: 'var(--text-sub)', fontSize: 13, fontWeight: 500 }}>{label}</span>
              <span style={{ color: 'var(--text)', fontSize: 13, fontWeight: 700 }}>{value}{unit}</span>
            </div>
          )}
          <div style={{ position: 'relative', height: 26, display: 'flex', alignItems: 'center' }}>
            <div className="slider-track" style={{ width: '100%', position: 'relative' }}>
              <div
                className="slider-fill"
                style={{ width: `${pct}%`, background: 'var(--accent)' }}
              />
              <div className="slider-thumb" style={{ left: `${pct}%` }} />
            </div>
            <input
              type="range"
              min={min}
              max={max}
              value={value}
              onChange={e => onChange(Number(e.target.value))}
              style={{ position: 'absolute', inset: 0, width: '100%' }}
            />
          </div>
        </div>
      );
    }

    function ActionButton({ label, sublabel, onClick, danger = false, flush = false, prominent = false }) {
      const button = (
        <button
          onClick={() => { feedback(); onClick?.(); }}
          style={{
            width: '100%',
            padding: prominent ? '20px 18px' : (flush ? '16px 0' : '16px 18px'),
            border: 'none',
            background: 'transparent',
            color: 'var(--text)',
            cursor: 'pointer',
            textAlign: 'left',
            borderRadius: flush ? 0 : 17,
            transition: 'transform var(--motion-fast)',
          }}
        >
          <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 14 }}>
            <div style={{ minWidth: 0 }}>
              <div style={{ fontSize: prominent ? 19 : 15, fontWeight: 700, letterSpacing: prominent ? '-.03em' : '-.01em', color: danger ? '#e87060' : 'var(--text)' }}>{label}</div>
              {sublabel && (
                <div style={{ marginTop: 6, color: 'var(--text-sub)', fontSize: flush ? 12 : 11.5, lineHeight: 1.55 }}>
                  {sublabel}
                </div>
              )}
            </div>
            {!danger && (
              <div style={{ flexShrink: 0, marginTop: 2, width: 28, height: 28, borderRadius: '50%', display: 'grid', placeItems: 'center', background: 'var(--bg)', boxShadow: 'var(--shadow-inset-sm)', color: 'var(--text-sub)', fontSize: 16 }}>
                ›
              </div>
            )}
          </div>
        </button>
      );
      if (flush) return button;
      return (
        <div style={{ background: 'var(--bg)', borderRadius: prominent ? 22 : 18, boxShadow: 'var(--shadow-raised)' }}>
          {button}
        </div>
      );
    }

    function OverlayArtwork({ image, opacity, zoom, rotation, mirror, grid, fullscreen = false }) {
      const overlayTransform = [
        `scale(${zoom / 100})`,
        `rotate(${rotation}deg)`,
        mirror ? 'scaleX(-1)' : '',
      ].filter(Boolean).join(' ');

      return (
        <div
          style={{
            position: 'relative',
            height: '100%',
            minHeight: fullscreen ? 0 : 360,
            borderRadius: fullscreen ? 0 : 26,
            overflow: 'hidden',
            background: fullscreen
              ? '#000'
              : 'linear-gradient(160deg,rgba(205,225,255,.24) 0%,rgba(65,98,234,.22) 28%,rgba(15,18,78,.82) 62%,rgba(6,10,32,.94) 100%)',
          }}
        >
          {grid && [33, 66].map(p => (
            <div key={`gv-${p}`} style={{ position: 'absolute', top: `${p}%`, left: 0, right: 0, borderTop: '1px solid rgba(255,255,255,.12)', zIndex: 3 }} />
          ))}
          {grid && [33, 66].map(p => (
            <div key={`gh-${p}`} style={{ position: 'absolute', left: `${p}%`, top: 0, bottom: 0, borderLeft: '1px solid rgba(255,255,255,.12)', zIndex: 3 }} />
          ))}

          <div
            style={{
              position: 'absolute',
              inset: 0,
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              padding: fullscreen ? '5vh 4vw' : 24,
              zIndex: 2,
              pointerEvents: 'none',
            }}
          >
            <img
              src={image}
              alt="calque"
              style={{
                maxWidth: '100%',
                maxHeight: '100%',
                objectFit: 'contain',
                transform: overlayTransform,
                transformOrigin: 'center',
                opacity: opacity / 100,
                transition: 'opacity .12s, transform .18s',
                filter: fullscreen ? 'drop-shadow(0 20px 40px rgba(0,0,0,.45))' : 'drop-shadow(0 20px 30px rgba(10,8,40,.32))',
              }}
            />
          </div>

          {!fullscreen && (
            <>
              <div
                style={{
                  position: 'absolute',
                  inset: 0,
                  background: 'radial-gradient(circle at 50% 24%,rgba(255,255,255,.12),transparent 48%)',
                  zIndex: 1,
                }}
              />
              <div style={{ position: 'absolute', left: 18, right: 18, bottom: 18, zIndex: 4 }}>
                <div style={{ background: 'rgba(228,234,242,.88)', borderRadius: 14, padding: '10px 12px', backdropFilter: 'blur(8px)' }}>
                  <div style={{ color: 'var(--text-sub)', fontSize: 12, lineHeight: 1.4 }}>
                    Apercu du calque. Regle-le ici, puis ouvre l'appareil photo quand tu es pret.
                  </div>
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    function CameraOverlay({ image, opacity, zoom, rotation, mirror, grid, setZoom, onClose }) {
      const videoRef = useRef(null);
      const streamRef = useRef(null);
      const viewfinderRef = useRef(null);
      const [cameraReady, setCameraReady] = useState(false);
      const [cameraError, setCameraError] = useState('');

      useEffect(() => {
        let mounted = true;

        async function startCamera() {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: {
                facingMode: { ideal: 'environment' },
                width: { ideal: 1920 },
                height: { ideal: 1080 },
              },
              audio: false,
            });

            if (!mounted) {
              stream.getTracks().forEach(track => track.stop());
              return;
            }

            streamRef.current = stream;
            if (videoRef.current) {
              videoRef.current.srcObject = stream;
              videoRef.current.play().catch(() => {});
            }
            setCameraReady(true);
          } catch (error) {
            setCameraError("Impossible d'acceder a l'appareil photo. Verifie les autorisations du navigateur.");
          }
        }

        startCamera();

        return () => {
          mounted = false;
          streamRef.current?.getTracks().forEach(track => track.stop());
          if (videoRef.current) videoRef.current.srcObject = null;
        };
      }, []);

      useEffect(() => {
        const el = viewfinderRef.current;
        if (!el) return;

        let initialDist = null;
        let initialZoom = zoom;

        const onTouchStart = event => {
          if (event.touches.length === 2) {
            initialDist = Math.hypot(
              event.touches[0].clientX - event.touches[1].clientX,
              event.touches[0].clientY - event.touches[1].clientY
            );
            initialZoom = zoom;
          }
        };

        const onTouchMove = event => {
          if (event.touches.length === 2 && initialDist) {
            const dist = Math.hypot(
              event.touches[0].clientX - event.touches[1].clientX,
              event.touches[0].clientY - event.touches[1].clientY
            );
            const next = Math.round(Math.min(200, Math.max(40, initialZoom * (dist / initialDist))));
            setZoom(next);
          }
        };

        const onTouchEnd = () => {
          initialDist = null;
        };

        el.addEventListener('touchstart', onTouchStart, { passive: true });
        el.addEventListener('touchmove', onTouchMove, { passive: true });
        el.addEventListener('touchend', onTouchEnd, { passive: true });

        return () => {
          el.removeEventListener('touchstart', onTouchStart);
          el.removeEventListener('touchmove', onTouchMove);
          el.removeEventListener('touchend', onTouchEnd);
        };
      }, [zoom, setZoom]);

      return (
        <div style={{ position: 'fixed', inset: 0, zIndex: 30, background: '#000' }}>
          <div ref={viewfinderRef} style={{ position: 'absolute', inset: 0, overflow: 'hidden' }}>
            <video
              ref={videoRef}
              playsInline
              muted
              autoPlay
              style={{
                position: 'absolute',
                inset: 0,
                width: '100%',
                height: '100%',
                objectFit: 'cover',
                zIndex: 1,
                transform: 'translateZ(0)',
                WebkitTransform: 'translateZ(0)',
              }}
            />

            {!cameraReady && !cameraError && (
              <div
                style={{
                  position: 'absolute',
                  inset: 0,
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  color: 'rgba(255,255,255,.68)',
                  fontSize: 14,
                  zIndex: 3,
                }}
              >
                Ouverture de l'appareil photo...
              </div>
            )}

            <OverlayArtwork
              image={image}
              opacity={opacity}
              zoom={zoom}
              rotation={rotation}
              mirror={mirror}
              grid={grid}
              fullscreen
            />

            {cameraError && (
              <div style={{ position: 'absolute', left: 16, right: 16, bottom: 24, zIndex: 4 }}>
                <div style={{ background: 'rgba(10,12,20,.82)', backdropFilter: 'blur(14px)', borderRadius: 18, padding: '14px 16px' }}>
                  <div style={{ color: 'white', fontSize: 14, fontWeight: 600, marginBottom: 6 }}>Camera indisponible</div>
                  <div style={{ color: 'rgba(255,255,255,.68)', fontSize: 12, lineHeight: 1.5 }}>{cameraError}</div>
                </div>
              </div>
            )}
          </div>

          <button
            onClick={onClose}
            aria-label="Retour"
            style={{
              position: 'absolute',
              top: 'calc(env(safe-area-inset-top, 0px) + 14px)',
              left: 14,
              width: 46,
              height: 46,
              borderRadius: '50%',
              border: '1px solid rgba(255,255,255,.18)',
              background: 'rgba(10,10,20,.42)',
              color: 'white',
              cursor: 'pointer',
              zIndex: 5,
              fontSize: 24,
              lineHeight: 1,
              backdropFilter: 'blur(20px)',
              WebkitBackdropFilter: 'blur(20px)',
            }}
          >
            ←
          </button>
        </div>
      );
    }

    function TabCalque({
      image,
      opacity,
      setOpacity,
      zoom,
      setZoom,
      rotation,
      setRotation,
      mirror,
      setMirror,
      grid,
      setGrid,
      onImportImage,
      onOpenLibrary,
      onRemoveImage,
      onOpenCamera,
    }) {
      const fileRef = useRef(null);

      const handleImageImport = event => {
        const file = event.target.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = loadEvent => onImportImage(loadEvent.target.result);
        reader.readAsDataURL(file);
        event.target.value = '';
      };

      return (
        <div className="screen" style={{ height: '100%', display: 'flex', flexDirection: 'column', gap: 12, padding: '12px 16px 0', overflowY: 'auto' }}>
          {!image ? (
            <>
              <Neu r={28} innerStyle={{ padding: '28px 22px' }}>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  <div className="label-caps">Ecran d'accueil</div>
                  <div className="title-xl">
                    Choisis d'abord ton modele.
                  </div>
                  <div className="body-md">
                    Importe un calque depuis ta galerie ou va chercher une inspiration dans la bibliotheque avant d'ouvrir la camera.
                  </div>
                </div>
              </Neu>

              <Neu r={24} innerStyle={{ padding: '10px 16px' }}>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                  <div className="label-caps" style={{ margin: '4px 0 8px' }}>Actions</div>
                  <ActionButton
                    label="Importer un modele"
                    sublabel="Choisir une image depuis l'appareil ou la galerie."
                    onClick={() => fileRef.current?.click()}
                    flush
                    prominent
                  />
                  <div className="neu-divider" />
                  <ActionButton
                    label="Chercher des inspirations"
                    sublabel="Ouvrir la bibliotheque puis revenir avec une reference."
                    onClick={onOpenLibrary}
                    flush
                  />
                </div>
              </Neu>
            </>
          ) : (
            <>
              <Neu r={24} style={{ flexShrink: 0 }} innerStyle={{ padding: 12 }}>
                <div style={{ aspectRatio: '4 / 5' }}>
                    <OverlayArtwork
                      image={image}
                      opacity={opacity}
                      zoom={zoom}
                      rotation={rotation}
                      mirror={mirror}
                      grid={grid}
                    />
                </div>
              </Neu>

              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12, padding: '2px 2px 0' }}>
                <div>
                  <div className="label-caps">Modele actif</div>
                  <div className="title-lg">Reglages du calque</div>
                </div>
                <div style={{ width: 120, flexShrink: 0 }}>
                  <ActionButton
                    label="Supprimer"
                    sublabel=""
                    onClick={onRemoveImage}
                    danger
                  />
                </div>
              </div>

              <Neu r={24} innerStyle={{ padding: '18px 16px' }}>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12 }}>
                    <div className="label-caps">Outils</div>
                    <div className="label-caps">Ajustement</div>
                  </div>
                  <GlassSlider value={opacity} onChange={setOpacity} label="Opacite du calque" />
                  <GlassSlider value={zoom} onChange={setZoom} min={40} max={200} label="Zoom" unit="%" />
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, minmax(0, 1fr))', gap: 8 }}>
                    <Neu r={14}>
                      <button onClick={() => { feedback(); setRotation(value => (value + 90) % 360); }} style={{ width: '100%', padding: '12px 0', background: 'transparent', border: 'none', cursor: 'pointer', textAlign: 'center', borderRadius: 13 }}>
                        <div style={{ fontSize: 18, marginBottom: 3, color: 'var(--text)' }}>↻</div>
                        <div style={{ color: 'var(--text-mute)', fontSize: 10, fontWeight: 500 }}>Rotation</div>
                      </button>
                    </Neu>
                    <Neu r={14}>
                      <button onClick={() => { feedback(); setGrid(value => !value); }} style={{ width: '100%', padding: '12px 0', background: 'transparent', border: 'none', cursor: 'pointer', textAlign: 'center', borderRadius: 13 }}>
                        <div style={{ fontSize: 18, marginBottom: 3, color: grid ? 'var(--accent)' : 'var(--text)' }}>⊞</div>
                        <div style={{ color: grid ? 'var(--accent)' : 'var(--text-mute)', fontSize: 10, fontWeight: 500 }}>Grille</div>
                      </button>
                    </Neu>
                    <Neu r={14}>
                      <button onClick={() => { feedback(); setMirror(value => !value); }} style={{ width: '100%', padding: '12px 0', background: 'transparent', border: 'none', cursor: 'pointer', textAlign: 'center', borderRadius: 13 }}>
                        <div style={{ fontSize: 18, marginBottom: 3, color: mirror ? 'var(--accent)' : 'var(--text)' }}>⇋</div>
                        <div style={{ color: mirror ? 'var(--accent)' : 'var(--text-mute)', fontSize: 10, fontWeight: 500 }}>Miroir</div>
                      </button>
                    </Neu>
                  </div>
                  <ActionButton
                    label="Ouvrir dans l'appareil photo"
                    sublabel="Passe en plein ecran avec le calque par-dessus."
                    onClick={onOpenCamera}
                  />
                </div>
              </Neu>
            </>
          )}

          <input
            ref={fileRef}
            type="file"
            accept="image/*"
            style={{ display: 'none' }}
            onChange={handleImageImport}
          />
          <div style={{ height: 12 }} />
        </div>
      );
    }

    const PAINT_DATA = window.PAINT_DATA || { pigments: {}, brands: [], defaultPaintIds: [] };

    function hexToRgb(hex) {
      return [parseInt(hex.slice(1, 3), 16), parseInt(hex.slice(3, 5), 16), parseInt(hex.slice(5, 7), 16)];
    }

    function rgbToHex(rgb) {
      const [r, g, b] = rgb;
      const toHex = value => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');
      return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
    }

    function srgbToLinear(channel) {
      const value = channel / 255;
      return value <= 0.04045 ? value / 12.92 : ((value + 0.055) / 1.055) ** 2.4;
    }

    function linearToSrgb(value) {
      const clamped = Math.max(0, Math.min(1, value));
      return clamped <= 0.0031308 ? clamped * 12.92 : 1.055 * (clamped ** (1 / 2.4)) - 0.055;
    }

    function hexToLinearRgb(hex) {
      return hexToRgb(hex).map(srgbToLinear);
    }

    function linearRgbToHex(rgb) {
      return rgbToHex(rgb.map(channel => linearToSrgb(channel) * 255));
    }

    function reflectanceToKS(reflectance) {
      const safe = Math.max(0.0001, Math.min(0.9999, reflectance));
      return ((1 - safe) ** 2) / (2 * safe);
    }

    function ksToReflectance(ks) {
      return 1 + ks - Math.sqrt((ks * ks) + (2 * ks));
    }

    function hexToOklab(hex) {
      const [r, g, b] = hexToLinearRgb(hex);
      const l = 0.4122214708 * r + 0.5363325363 * g + 0.0514459929 * b;
      const m = 0.2119034982 * r + 0.6806995451 * g + 0.1073969566 * b;
      const s = 0.0883024619 * r + 0.2817188376 * g + 0.6299787005 * b;

      const lRoot = Math.cbrt(l);
      const mRoot = Math.cbrt(m);
      const sRoot = Math.cbrt(s);

      return [
        0.2104542553 * lRoot + 0.7936177850 * mRoot - 0.0040720468 * sRoot,
        1.9779984951 * lRoot - 2.4285922050 * mRoot + 0.4505937099 * sRoot,
        0.0259040371 * lRoot + 0.7827717662 * mRoot - 0.8086757660 * sRoot,
      ];
    }

    function oklabDistance(hexA, hexB) {
      const [l1, a1, b1] = hexToOklab(hexA);
      const [l2, a2, b2] = hexToOklab(hexB);
      return Math.sqrt((l1 - l2) ** 2 + (a1 - a2) ** 2 + (b1 - b2) ** 2);
    }

    function buildPaintColor(pigments, pigmentMap) {
      if (!pigments.length) return '#808080';
      if (pigments.length === 1) return pigmentMap[pigments[0]]?.hex || '#808080';

      const rgb = pigments
        .map(code => pigmentMap[code]?.hex)
        .filter(Boolean)
        .map(hexToLinearRgb);

      if (!rgb.length) return '#808080';

      const average = [0, 1, 2].map(index => rgb.reduce((sum, item) => sum + item[index], 0) / rgb.length);
      return linearRgbToHex(average);
    }

    function expandPaintLibrary() {
      const pigmentMap = PAINT_DATA.pigments || {};
      const paints = [];

      (PAINT_DATA.brands || []).forEach(brand => {
        brand.colors.forEach(color => {
          const pigmentEntries = color.pigments
            .map(code => ({ code, ...pigmentMap[code] }))
            .filter(entry => entry.name);

          const opacityScore = pigmentEntries.length
            ? pigmentEntries.reduce((sum, pigment) => sum + (pigment.opacity ?? 0.6), 0) / pigmentEntries.length
            : 0.6;

          const tintStrength = pigmentEntries.length
            ? pigmentEntries.reduce((sum, pigment) => sum + (pigment.tintStrength ?? 0.6), 0) / pigmentEntries.length
            : 0.6;

          paints.push({
            id: color.id,
            brandId: brand.id,
            brandName: brand.name,
            range: brand.range,
            name: color.name,
            pigments: color.pigments,
            pigmentLabel: color.pigments.join(', '),
            shade: color.shade,
            opacityLabel: color.opacity,
            color: color.hex || buildPaintColor(color.pigments, pigmentMap),
            opacityScore,
            tintStrength,
          });
        });
      });

      return paints;
    }

    const PAINT_LIBRARY = expandPaintLibrary();
    const DEFAULT_PAINTS = PAINT_DATA.defaultPaintIds
      .map(id => PAINT_LIBRARY.find(paint => paint.id === id))
      .filter(Boolean);
    const MY_PAINTS_STORAGE_KEY = 'pointure_my_paints';

    function mixPaints(parts) {
      const active = parts.filter(part => part.ratio > 0);
      if (!active.length) return '#444444';

      const total = active.reduce((sum, part) => sum + part.ratio, 0);
      const mixedKS = [0, 0, 0];

      active.forEach(part => {
        const weight = part.ratio / total;
        const pigmentInfluence = 0.65 + (part.tintStrength * 0.35);
        const bodyInfluence = 0.75 + (part.opacityScore * 0.25);
        const effectiveWeight = weight * pigmentInfluence * bodyInfluence;
        const linear = hexToLinearRgb(part.color);

        linear.forEach((channel, index) => {
          mixedKS[index] += reflectanceToKS(channel) * effectiveWeight;
        });
      });

      const reflectance = mixedKS.map(ksToReflectance);
      return linearRgbToHex(reflectance);
    }

    function buildSuggestedMix(targetColor, paints) {
      if (!targetColor || paints.length === 0) return null;

      let best = null;

      const registerCandidate = parts => {
        const normalized = parts.filter(part => part.ratio > 0);
        if (!normalized.length) return;
        const mixed = mixPaints(normalized);
        const distance = oklabDistance(targetColor, mixed);

        if (!best || distance < best.distance) {
          best = { parts: normalized, mixed, distance };
        }
      };

      paints.forEach(paint => registerCandidate([{ ...paint, ratio: 100 }]));

      for (let i = 0; i < paints.length; i += 1) {
        for (let j = i + 1; j < paints.length; j += 1) {
          for (let ratio = 10; ratio <= 90; ratio += 5) {
            registerCandidate([
              { ...paints[i], ratio: 100 - ratio },
              { ...paints[j], ratio },
            ]);
          }
        }
      }

      if (paints.length >= 3) {
        for (let i = 0; i < paints.length; i += 1) {
          for (let j = i + 1; j < paints.length; j += 1) {
            for (let k = j + 1; k < paints.length; k += 1) {
              for (let a = 20; a <= 60; a += 10) {
                for (let b = 15; b <= 60 - a; b += 5) {
                  const c = 100 - a - b;
                  if (c <= 0) continue;
                  registerCandidate([
                    { ...paints[i], ratio: a },
                    { ...paints[j], ratio: b },
                    { ...paints[k], ratio: c },
                  ]);
                }
              }
            }
          }
        }
      }

      if (!best) return null;

      return {
        ...best,
        proximity: Math.max(0, Math.min(100, Math.round((1 - (best.distance / 0.42)) * 100))),
      };
    }

    function averageSample(ctx, centerX, centerY, radius = 2) {
      const size = radius * 2 + 1;
      const startX = Math.max(0, centerX - radius);
      const startY = Math.max(0, centerY - radius);
      const width = Math.min(size, ctx.canvas.width - startX);
      const height = Math.min(size, ctx.canvas.height - startY);
      const data = ctx.getImageData(startX, startY, width, height).data;
      let r = 0;
      let g = 0;
      let b = 0;
      let count = 0;
      for (let i = 0; i < data.length; i += 4) {
        const alpha = data[i + 3] / 255;
        if (alpha <= 0.02) continue;
        r += data[i] * alpha;
        g += data[i + 1] * alpha;
        b += data[i + 2] * alpha;
        count += alpha;
      }
      if (!count) return [255, 255, 255];
      return [Math.round(r / count), Math.round(g / count), Math.round(b / count)];
    }

        const canvas = canvasRef.current || document.createElement('canvas');

        const px = Math.max(0, Math.min(img.naturalWidth - 1, Math.round((x / rect.width) * img.naturalWidth)));

    function ColorPickerOverlay({ currentColor, onClose, onConfirm }) {
      function hexToHsv(hex) {
        const [r, g, b] = hexToRgb(hex).map(v => v / 255);
        const max = Math.max(r, g, b), min = Math.min(r, g, b), d = max - min;
        let h = 0;
        const s = max === 0 ? 0 : d / max;
        const v = max;
        if (d !== 0) {
          if (max === r) h = (g - b) / d + (g < b ? 6 : 0);
          else if (max === g) h = (b - r) / d + 2;
          else h = (r - g) / d + 4;
          h /= 6;
        }
        return { h: h * 360, s: s * 100, v: v * 100 };
      }

      function hsvToHex(h, s, v) {
        s /= 100; v /= 100;
        const i = Math.floor(h / 60) % 6;
        const f = h / 60 - Math.floor(h / 60);
        const p = v * (1 - s), q = v * (1 - f * s), t = v * (1 - (1 - f) * s);
        let r, g, b;
        if (i === 0) { r = v; g = t; b = p; }
        else if (i === 1) { r = q; g = v; b = p; }
        else if (i === 2) { r = p; g = v; b = t; }
        else if (i === 3) { r = p; g = q; b = v; }
        else if (i === 4) { r = t; g = p; b = v; }
        else { r = v; g = p; b = q; }
        return rgbToHex([Math.round(r * 255), Math.round(g * 255), Math.round(b * 255)]);
      }

      const initial = currentColor ? hexToHsv(currentColor) : { h: 180, s: 50, v: 50 };
      const [hue, setHue] = useState(initial.h);
      const [sat, setSat] = useState(initial.s);
      const [val, setVal] = useState(initial.v);
      const [hexInput, setHexInput] = useState(currentColor ? currentColor.toUpperCase() : hsvToHex(180, 50, 50).toUpperCase());

      const draftColor = hsvToHex(hue, sat, val);
      const svRef = useRef(null);
      const hueRef = useRef(null);

      const handleSvInteraction = event => {
        const rect = svRef.current?.getBoundingClientRect();
        if (!rect) return;
        const point = event.touches?.[0] || event;
        const x = Math.max(0, Math.min(1, (point.clientX - rect.left) / rect.width));
        const y = Math.max(0, Math.min(1, (point.clientY - rect.top) / rect.height));
        const newSat = x * 100;
        const newVal = (1 - y) * 100;
        setSat(newSat);
        setVal(newVal);
        setHexInput(hsvToHex(hue, newSat, newVal).toUpperCase());
      };

      const handleHueInteraction = event => {
        const rect = hueRef.current?.getBoundingClientRect();
        if (!rect) return;
        const point = event.touches?.[0] || event;
        const x = Math.max(0, Math.min(1, (point.clientX - rect.left) / rect.width));
        const newHue = x * 360;
        setHue(newHue);
        setHexInput(hsvToHex(newHue, sat, val).toUpperCase());
      };

        const v = e.target.value;
        setHexInput(v);
        if (/^#[0-9a-fA-F]{6}$/.test(v)) {

          setHue(hsv.h);
          setSat(hsv.s);
          setVal(hsv.v);
        }
      };

      return (
        <div style={{ position: 'fixed', inset: 0, zIndex: 35, background: 'rgba(2,6,18,.88)', backdropFilter: 'blur(18px)', WebkitBackdropFilter: 'blur(18px)' }}>

                <span style={{ color: 'white', fontSize: 13, fontWeight: 700 }}>{draftColor.toUpperCase()}</span>
              </div>
            </div>
          </div>

          <div style={{ position: 'absolute', inset: 'calc(env(safe-area-inset-top, 0px) + 78px) 18px 130px', display: 'flex', flexDirection: 'column', gap: 18, justifyContent: 'center' }}>

              <div style={{
                position: 'absolute',

            </div>

            <div style={{ display: 'flex', alignItems: 'center', gap: 12, background: 'rgba(255,255,255,.1)', borderRadius: 16, padding: '12px 16px' }}>
              <div style={{ width: 30, height: 30, borderRadius: 10, background: draftColor, boxShadow: `0 0 14px ${draftColor}66`, flexShrink: 0 }} />

    function buildReferencePoster(ref) {
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200">
          <defs>
            <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="${ref.palette[0]}" />
              <stop offset="100%" stop-color="${ref.palette[ref.palette.length - 1]}" />
            </linearGradient>
          </defs>
          <rect width="900" height="1200" fill="url(#bg)" />
          <rect x="74" y="74" width="752" height="1052" rx="42" fill="rgba(8,10,24,0.24)" stroke="rgba(255,255,255,0.28)" />
          <circle cx="250" cy="280" r="170" fill="${ref.palette[1]}" opacity="0.82" />
          <circle cx="590" cy="390" r="200" fill="${ref.palette[2]}" opacity="0.8" />
          <circle cx="430" cy="700" r="245" fill="${ref.palette[3]}" opacity="0.72" />
          <circle cx="685" cy="820" r="165" fill="${ref.palette[4]}" opacity="0.8" />
          <text x="110" y="980" fill="white" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800">${ref.title}</text>
          <text x="110" y="1048" fill="rgba(255,255,255,0.82)" font-family="Inter, Arial, sans-serif" font-size="38">${ref.artist}</text>
        </svg>
      `;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function buildCommonsThumb(url, width = 640) {
      const prefix = 'https://commons.wikimedia.org/wiki/Special:FilePath/';
      if (!url || !url.startsWith(prefix)) return url;
      const fileName = url.slice(prefix.length);
      return `https://commons.wikimedia.org/wiki/Special:Redirect/file/${encodeURIComponent(fileName)}?width=${width}`;
    }

    function getLibraryImageUrl(ref) {
      if (!ref.imageUrl) return buildReferencePoster(ref);
      if (ref.thumbnailUrl) return ref.thumbnailUrl;
      if (ref.imageUrl.includes('commons.wikimedia.org/wiki/Special:FilePath/')) {
        return buildCommonsThumb(ref.imageUrl, 720);
      }
      return ref.imageUrl;
    }

    function getReferenceAsset(ref) {
      if (!ref.imageUrl) return buildReferencePoster(ref);
      if (ref.referenceUrl) return ref.referenceUrl;
      if (ref.imageUrl.includes('commons.wikimedia.org/wiki/Special:FilePath/')) {
        return buildCommonsThumb(ref.imageUrl, 1600);
      }
      return ref.imageUrl;
    }

    function ReferenceCardImage({ refItem }) {
      const [visible, setVisible] = useState(false);
      const [failed, setFailed] = useState(false);
      const hostRef = useRef(null);

      useEffect(() => {
        const node = hostRef.current;
        if (!node || visible) return;
        const observer = new IntersectionObserver(
          entries => {
            if (entries.some(entry => entry.isIntersecting)) {
              setVisible(true);
              observer.disconnect();
            }
          },
          { rootMargin: '220px 0px' }
        );
        observer.observe(node);
        return () => observer.disconnect();
      }, [visible]);

      const poster = buildReferencePoster(refItem);
      const displayUrl = failed ? poster : getLibraryImageUrl(refItem);

      return (
        <div ref={hostRef} style={{ height: 120, borderRadius: '20px 20px 0 0', overflow: 'hidden', position: 'relative', background: 'var(--bg)' }}>
          {visible ? (
            <img
              src={displayUrl}
              alt={refItem.title}
              loading="lazy"
              decoding="async"
              fetchPriority="low"
              onError={() => setFailed(true)}
              style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }}
            />
          ) : (
            <div style={{ width: '100%', height: '100%', background: `linear-gradient(135deg, ${refItem.palette[0]}, ${refItem.palette[3]})` }} />
          )}
          <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(180deg,transparent 35%,rgba(5,2,30,.68) 100%)' }} />
          {failed && (
            <div style={{ position: 'absolute', top: 8, right: 8, padding: '4px 8px', borderRadius: 999, background: 'rgba(6,12,34,.56)', border: '1px solid rgba(255,255,255,.16)', color: 'rgba(255,255,255,.76)', fontSize: 9, fontWeight: 700, letterSpacing: .5, textTransform: 'uppercase' }}>
              Apercu
            </div>
          )}
        </div>
      );
    }

    function Onboarding({ onDone }) {
      const [page, setPage] = useState(0);
      const TOTAL = 4;
      const touchX = useRef(null);

      const go = (next) => { feedback(); setPage(next); };
      const finish = () => {
        feedback();
        localStorage.setItem('pointure_onboarded', '1');
        onDone();

      const handleTouchStart = (e) => { touchX.current = e.touches[0].clientX; };
      const handleTouchEnd = (e) => {
        if (touchX.current === null) return;
        const dx = e.changedTouches[0].clientX - touchX.current;
        touchX.current = null;

                  boxShadow: `0 6px 18px ${color}55, 0 2px 6px rgba(0,0,0,.18)`,
                }} />
                <span style={{ fontSize: 8.5, color: 'var(--text-mute)', fontWeight: 500, textAlign: 'center', maxWidth: 52 }}>{label}</span>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16 }}>
            <div style={{ flex: 1, height: 1, background: 'linear-gradient(90deg, transparent, rgba(163,177,198,.35))' }} />
            <div style={{
              width: 44, height: 44, borderRadius: '50%',
              background: 'radial-gradient(circle at 35% 32%, #c07848 0%, #a05830 100%)',
              boxShadow: '0 4px 14px #c0784855, 0 2px 6px rgba(0,0,0,.2)',
              display: 'grid', placeItems: 'center',
            }}>
              <span style={{ fontSize: 8, color: 'rgba(255,255,255,.7)', fontWeight: 700 }}>Mix</span>
            </div>
            <div style={{ flex: 1, height: 1, background: 'linear-gradient(90deg, rgba(163,177,198,.35), transparent)' }} />
          </div>
          <div style={{ display: 'flex', gap: 6, justifyContent: 'center' }}>
            {['#e87060','#c07848','#e8a040','#f0c040','#8fa8e0','#6878c0'].map((c) => (
              <div key={c} style={{ width: 28, height: 28, borderRadius: 9, background: c, boxShadow: `0 2px 8px ${c}44` }} />
            ))}
          </div>
        </div>
      );

      const BiblioVisual = (
        <div style={{ background: 'var(--bg)', borderRadius: 20, padding: 12, boxShadow: 'var(--shadow-inset)' }}>
          <div style={{
            background: 'var(--bg)', borderRadius: 12, boxShadow: 'var(--shadow-inset-sm)',
            padding: '7px 12px', marginBottom: 10,
            display: 'flex', alignItems: 'center', gap: 8,
          }}>
            <svg width="12" height="12" fill="none" stroke="var(--text-mute)" strokeWidth="2" strokeLinecap="round" viewBox="0 0 16 16">
              <circle cx="6.5" cy="6.5" r="5" /><path d="M10.5 10.5l3.5 3.5" />
            </svg>
            <span style={{ fontSize: 11, color: 'var(--text-mute)' }}>Rechercher une référence…</span>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 7 }}>
            {[
              ['#4878a8','#d8e8f0','#c8b070','Ground Swell'],
              ['#806090','#c090d8','#f0d0f8','Nu debout'],
              ['#405878','#788090','#c0a870','Portrait'],
              ['#c06840','#e0a860','#f8d890','Coucher de soleil'],
              ['#486890','#90b8d0','#e8f0d8','Seascape'],
              ['#506838','#88a850','#d8e8b8','Paysage'],
            ].map(([c0, c1, c2, title], i) => (
              <div key={i} style={{ borderRadius: 10, overflow: 'hidden', boxShadow: 'var(--shadow-flat)', aspectRatio: '3/4' }}>
                <div style={{
                  width: '100%', height: '100%',
                  background: `linear-gradient(148deg, ${c0} 0%, ${c1} 55%, ${c2} 100%)`,
                  display: 'flex', alignItems: 'flex-end', padding: 5,
                }}>
                  <span style={{ fontSize: 7, color: 'rgba(255,255,255,0.85)', fontWeight: 700, lineHeight: 1.2 }}>{title}</span>
                </div>
              </div>
            ))}
          </div>
        </div>
      );

      const pages = [
        {
          accent: '#3ab5b0',
          visual: CalqueVisual,
          title: 'Importe ton calque',
          text: 'Ajuste l\'opacité, le zoom et la rotation pour aligner parfaitement ton dessin sur ta référence.',
        },
        {
          accent: '#e8a040',
          visual: InstallVisual,
          title: 'L\'astuce de l\'installation',
          bullets: [
            'Fais une pile de livres',
            'Bloque une règle à la hauteur voulue',
            'Pose ton téléphone en équilibre dessus',
          ],
        },
        {
          accent: '#e87060',
          visual: CouleursVisual,
          title: 'Mélange tes couleurs',
          text: 'Prélève les teintes de ta référence et laisse l\'app calculer le mélange le plus proche dans ta palette.',
        },
        {
          accent: '#7c6ee8',
          visual: BiblioVisual,
          title: 'Explore la bibliothèque',
          text: 'Poses, anatomies, lumières, paysages — des références pour alimenter ton regard de peintre.',
        },
      ];

      const p = pages[page];

      return (
        <div
          style={{
            position: 'fixed', inset: 0, zIndex: 1000,
            display: 'flex', flexDirection: 'column',
            alignItems: 'stretch', justifyContent: 'flex-end',
            background: 'rgba(180,192,210,0.42)',
            backdropFilter: 'blur(18px)',
            WebkitBackdropFilter: 'blur(18px)',
          }}
          onTouchStart={handleTouchStart}
          onTouchEnd={handleTouchEnd}
        >
          <div style={{
            background: 'var(--bg)',
            borderRadius: '32px 32px 0 0',
            boxShadow: '0 -6px 48px rgba(163,177,198,.48), 0 -1px 0 rgba(255,255,255,.9)',
            animation: 'onboardSlideUp 0.55s cubic-bezier(0.22,1,0.36,1) both',
            display: 'flex', flexDirection: 'column',
            paddingBottom: 'calc(env(safe-area-inset-bottom, 0px) + 20px)',
          }}>
            <div style={{ display: 'flex', justifyContent: 'center', padding: '14px 0 6px' }}>
              <div style={{ width: 36, height: 4, borderRadius: 2, background: 'var(--text-mute)', opacity: 0.35 }} />
            </div>
            <div style={{ display: 'flex', justifyContent: 'flex-end', padding: '4px 22px 0', minHeight: 28 }}>
              {page < TOTAL - 1 && (
                <button onClick={finish} style={{
                  background: 'none', border: 'none', cursor: 'pointer',
                  color: 'var(--text-mute)', fontSize: 13, fontWeight: 500,
                  padding: '2px 4px', fontFamily: 'inherit',
                }}>Passer</button>
              )}
            </div>
            <div key={`v-${page}`} style={{ margin: '10px 20px 0', animation: 'fadeUp 0.38s cubic-bezier(0.22,1,0.36,1) both' }}>
              {p.visual}
            </div>
            <div key={`t-${page}`} style={{ padding: '18px 22px 0', animation: 'fadeUp 0.42s 0.06s cubic-bezier(0.22,1,0.36,1) both' }}>
              <div style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-.02em', color: 'var(--text)', marginBottom: 9, lineHeight: 1.18 }}>
                {p.title}
              </div>
              {p.text && (
                <div style={{ fontSize: 14, fontWeight: 300, lineHeight: 1.65, color: 'var(--text-sub)' }}>
                  {p.text}
                </div>
              )}
              {p.bullets && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 11 }}>
                  {p.bullets.map((b, i) => (
                    <div key={i} style={{ display: 'flex', alignItems: 'flex-start', gap: 11 }}>
                      <div style={{
                        width: 26, height: 26, borderRadius: 9,
                        background: 'var(--bg)', boxShadow: 'var(--shadow-flat)',
                        display: 'grid', placeItems: 'center', flexShrink: 0, marginTop: 1,
                        fontSize: 11, color: p.accent, fontWeight: 700,
                      }}>{i + 1}</div>
                      <span style={{ fontSize: 14, color: 'var(--text-sub)', lineHeight: 1.55 }}>{b}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div style={{
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              padding: '22px 22px 0',
            }}>
              <div style={{ display: 'flex', gap: 7, alignItems: 'center' }}>
                {Array.from({ length: TOTAL }).map((_, i) => (
                  <div key={i} onClick={() => i < page && go(i)} style={{
                    width: i === page ? 24 : 6, height: 6, borderRadius: 3,
                    background: i === page ? p.accent : 'var(--text-mute)',
                    opacity: i === page ? 1 : 0.28,
                    transition: 'width 0.38s cubic-bezier(0.22,1,0.36,1), background 0.38s, opacity 0.38s',
                    cursor: i < page ? 'pointer' : 'default',
                  }} />
                ))}
              </div>
              <button
                onClick={page < TOTAL - 1 ? () => go(page + 1) : finish}
                style={{
                  background: p.accent, border: 'none', borderRadius: 16,
                  color: '#fff', fontFamily: 'inherit', fontSize: 14, fontWeight: 600,
                  padding: '13px 24px', cursor: 'pointer',
                  boxShadow: `0 4px 16px ${p.accent}55`,
                  transition: 'background 0.35s, box-shadow 0.35s',
                }}
              >
                {page < TOTAL - 1 ? 'Suivant →' : 'Commencer'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    const TAB_ORDER = ['calque', 'couleurs', 'biblio'];

    function App() {
      const [showOnboarding, setShowOnboarding] = useState(() => !localStorage.getItem('pointure_onboarded'));
      const [tab, setTab] = useState('calque');
      const [darkMode, setDarkMode] = useState(false);
      const [overlayImage, setOverlayImage] = useState(() => {
        const saved = localStorage.getItem('pointure_overlay_image');
        return saved || null;
      });
      const [cameraMode, setCameraMode] = useState(false);
      const [opacity, setOpacity] = useState(65);
      const [zoom, setZoom] = useState(100);
      const [rotation, setRotation] = useState(0);
      const [mirror, setMirror] = useState(false);

      useEffect(() => {
        document.documentElement.classList.toggle('dark', darkMode);
        document.documentElement.style.background = darkMode ? '#1e2535' : '#e4eaf2';
      }, [darkMode]);
      const [grid, setGrid] = useState(false);
      const [slideDir, setSlideDir] = useState(null);

      const switchTab = nextTab => {
        if (nextTab === tab) return;
        const fi = TAB_ORDER.indexOf(tab);
        const ti = TAB_ORDER.indexOf(nextTab);
        setSlideDir(ti > fi ? 'right' : 'left');
        setTab(nextTab);
        localStorage.setItem('pointure_tab', nextTab);
      };

      const handleImportImage = image => {
        setOverlayImage(image);
        switchTab('calque');
      };

      const handleUseReference = image => {
        setOverlayImage(image);
        switchTab('calque');
      };

      const handleRemoveImage = () => {
        setOverlayImage(null);
        setCameraMode(false);
      };

      useEffect(() => {
        if (!overlayImage) {
          localStorage.removeItem('pointure_overlay_image');
          return;
        }
        if (typeof overlayImage === 'string' && !overlayImage.startsWith('data:')) {
          localStorage.setItem('pointure_overlay_image', overlayImage);
          return;
        }
        localStorage.removeItem('pointure_overlay_image');
      }, [overlayImage]);

      if (cameraMode && overlayImage) {
        return (
          <CameraOverlay
            image={overlayImage}
            opacity={opacity}
            zoom={zoom}
            rotation={rotation}
            mirror={mirror}
            grid={grid}
            setZoom={setZoom}
            onClose={() => setCameraMode(false)}
          />
        );
      }

      return (
        <div className={`${darkMode ? 'dark ' : ''}tab-${tab}`} style={{ position: 'fixed', inset: 0, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: 'var(--bg)', transition: 'background 0.35s' }}>
          <div style={{ display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0, paddingTop: 'env(safe-area-inset-top,0px)' }}>
            <div style={{ padding: '14px 18px 10px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
              <div>
                <div className="label-caps">Application</div>
                <div style={{ fontSize: 30, fontWeight: 700, letterSpacing: '-.02em', color: 'var(--text)', marginTop: 2 }}>Pointure</div>
              </div>
              <button
                onClick={() => { feedback(); setDarkMode(d => !d); }}
                aria-label={darkMode ? 'Mode clair' : 'Mode sombre'}
                style={{
                  width: 44,
                  height: 44,
                  borderRadius: '50%',
                  background: 'var(--bg)',
                  border: 'none',
                  boxShadow: 'var(--shadow-raised)',
                  cursor: 'pointer',
                  display: 'grid',
                  placeItems: 'center',
                  transition: 'box-shadow 0.3s',
                  flexShrink: 0,
                }}
              >
                <div style={{
                  width: 18,
                  height: 18,
                  borderRadius: '50%',
                  background: darkMode ? 'rgba(220,230,245,0.92)' : '#2d3748',
                  transition: 'background 0.35s',
                }} />
              </button>
            </div>

            <div style={{ flex: 1, minHeight: 0, position: 'relative', overflow: 'hidden' }}>
              <div key={tab} style={{ position: 'absolute', inset: 0, overflowY: 'auto', overflowX: 'hidden', WebkitOverflowScrolling: 'touch', animation: slideDir ? `${slideDir === 'right' ? 'pageSlideInRight' : 'pageSlideInLeft'} .8s cubic-bezier(0.22,1,0.36,1) both` : undefined }}>
                {tab === 'calque' && (
                  <TabCalque
                    image={overlayImage}
                    opacity={opacity}
                    setOpacity={setOpacity}
                    zoom={zoom}
                    setZoom={setZoom}
                    rotation={rotation}
                    setRotation={setRotation}
                    mirror={mirror}
                    setMirror={setMirror}
                    grid={grid}
                    setGrid={setGrid}
                    onImportImage={handleImportImage}
                    onOpenLibrary={() => switchTab('biblio')}
                    onRemoveImage={handleRemoveImage}
                    onOpenCamera={() => setCameraMode(true)}
                  />
                )}
                {tab === 'couleurs' && <TabCouleurs overlayImage={overlayImage} />}
                {tab === 'biblio' && <TabBibliotheque onUseReference={handleUseReference} />}
              </div>
            </div>

            <div style={{ flexShrink: 0, borderTop: '1px solid rgba(163,177,198,.25)' }}>
              <TabBar tab={tab} setTab={switchTab} />
            </div>
          </div>
          {showOnboarding && <Onboarding onDone={() => setShowOnboarding(false)} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
