<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#06050f" />
  <title>Pointure</title>
  <link rel="manifest" href="/pointure/public/manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/ui/glass.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (prototype rapide, à remplacer par un build tool en prod) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    /* ── Liquid Glass wrapper ── */
    function LG({ children, r = 26, style = {}, innerStyle = {} }) {
      return (
        <div className="lg-wrap" style={{ '--r': r + 'px', ...style }}>
          <div className="lg-inner" style={innerStyle}>
            <div className="lg-content">{children}</div>
          </div>
        </div>
      );
    }

    /* ── Paint Blob Button ── */
    function PaintBlob({ color, size = 44, active, onClick }) {
      const [ripples, setRipples] = useState([]);
      const fire = () => {
        const id = Date.now();
        setRipples(r => [...r, id]);
        setTimeout(() => setRipples(r => r.filter(x => x !== id)), 700);
        onClick && onClick();
      };
      return (
        <button onClick={fire} style={{
          width: size, height: size, borderRadius: '50%',
          position: 'relative', overflow: 'hidden',
          cursor: 'pointer', outline: 'none', flexShrink: 0,
          background: `linear-gradient(148deg,rgba(255,255,255,.6) 0%,rgba(255,255,255,.1) 50%,rgba(255,255,255,.25) 100%)`,
          padding: '1.5px',
          boxShadow: active
            ? `0 0 0 3px rgba(255,255,255,.35), 0 6px 24px ${color}99, 0 2px 8px rgba(0,0,0,.4)`
            : `0 4px 18px ${color}66, 0 2px 6px rgba(0,0,0,.35)`,
          transform: active ? 'scale(1.08)' : 'scale(1)',
          transition: 'transform .18s, box-shadow .18s',
          border: 'none',
        }}>
          <div style={{
            position: 'absolute', inset: '1.5px', borderRadius: '50%',
            background: `radial-gradient(circle at 40% 38%, ${color}ff 0%, ${color}cc 55%, ${color}88 100%)`,
            animation: 'paintBob 3.5s ease-in-out infinite',
          }} />
          <div style={{
            position: 'absolute', top: '6%', left: '10%',
            width: '55%', height: '45%',
            borderRadius: '60% 40% 50% 60%',
            background: 'rgba(255,255,255,.38)', filter: 'blur(3px)', pointerEvents: 'none',
          }} />
          {ripples.map(id => (
            <div key={id} style={{
              position: 'absolute', top: '50%', left: '50%',
              width: size * .4, height: size * .4,
              marginLeft: -size * .2, marginTop: -size * .2,
              borderRadius: '50%', background: 'rgba(255,255,255,.45)',
              animation: 'ripple .7s ease-out forwards', pointerEvents: 'none',
            }} />
          ))}
        </button>
      );
    }

    /* ── Glass Slider ── */
    function GlassSlider({ value, onChange, min = 0, max = 100, label, unit = '%', accent }) {
      const pct = ((value - min) / (max - min)) * 100;
      const grad = accent || 'rgba(200,180,255,1)';
      return (
        <div>
          {label && (
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10 }}>
              <span style={{ color: 'rgba(255,255,255,.6)', fontSize: 13, fontWeight: 500 }}>{label}</span>
              <span style={{ color: 'white', fontSize: 13, fontWeight: 700 }}>{value}{unit}</span>
            </div>
          )}
          <div style={{ position: 'relative', height: 22, display: 'flex', alignItems: 'center' }}>
            <div className="slider-track" style={{ width: '100%', position: 'relative' }}>
              <div className="slider-fill" style={{
                width: `${pct}%`,
                background: `linear-gradient(90deg,rgba(80,60,200,.7),${grad})`,
                boxShadow: `0 0 10px ${grad}77`,
              }} />
              <div className="slider-thumb" style={{ left: `${pct}%` }} />
            </div>
            <input type="range" min={min} max={max} value={value}
              onChange={e => onChange(Number(e.target.value))}
              style={{ position: 'absolute', inset: 0, width: '100%' }}
            />
          </div>
        </div>
      );
    }

    /* ── Tab: Calque AR ── */
    function TabCalque() {
      const [opacity, setOpacity] = useState(65);
      const [zoom, setZoom] = useState(100);
      const [active, setActive] = useState(false);
      const [image, setImage] = useState(null);
      const [rotation, setRotation] = useState(0);
      const [mirror, setMirror] = useState(false);
      const [grid, setGrid] = useState(false);
      const fileRef = useRef();
      const videoRef = useRef();
      const streamRef = useRef();
      const viewfinderRef = useRef();

      // Pinch-to-zoom
      useEffect(() => {
        const el = viewfinderRef.current;
        if (!el) return;
        let initialDist = null;
        let initialZoom = zoom;
        const onTouchStart = e => {
          if (e.touches.length === 2) {
            initialDist = Math.hypot(
              e.touches[0].clientX - e.touches[1].clientX,
              e.touches[0].clientY - e.touches[1].clientY
            );
            initialZoom = zoom;
          }
        };
        const onTouchMove = e => {
          if (e.touches.length === 2 && initialDist) {
            const dist = Math.hypot(
              e.touches[0].clientX - e.touches[1].clientX,
              e.touches[0].clientY - e.touches[1].clientY
            );
            const next = Math.round(Math.min(200, Math.max(40, initialZoom * (dist / initialDist))));
            setZoom(next);
          }
        };
        const onTouchEnd = () => { initialDist = null; };
        el.addEventListener('touchstart', onTouchStart, { passive: true });
        el.addEventListener('touchmove', onTouchMove, { passive: true });
        el.addEventListener('touchend', onTouchEnd, { passive: true });
        return () => {
          el.removeEventListener('touchstart', onTouchStart);
          el.removeEventListener('touchmove', onTouchMove);
          el.removeEventListener('touchend', onTouchEnd);
        };
      }, [zoom]);

      const startCamera = async () => {
        try {
          const s = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 } },
            audio: false
          });
          streamRef.current = s;
          videoRef.current.srcObject = s;
          await videoRef.current.play();
          setActive(true);
        } catch (err) {
          alert("Impossible d'accéder à la caméra. Vérifiez les autorisations dans Réglages > Safari.");
        }
      };

      const stopCamera = () => {
        streamRef.current?.getTracks().forEach(t => t.stop());
        setActive(false);
      };

      const handleImageImport = e => {
        const f = e.target.files[0];
        if (!f) return;
        // startCamera() appelé en synchrone ici = contexte de geste utilisateur valide pour iOS Safari
        if (!active) startCamera();
        // FileReader → data URL : survit à toute suspension de l'app (blob URLs révoqués sur iOS)
        const reader = new FileReader();
        reader.onload = ev => setImage(ev.target.result);
        reader.readAsDataURL(f);
      };

      const overlayTransform = [
        `scale(${zoom / 100})`,
        `rotate(${rotation}deg)`,
        mirror ? 'scaleX(-1)' : '',
      ].filter(Boolean).join(' ');

      return (
        <div className="screen" style={{ height: '100%', display: 'flex', flexDirection: 'column', gap: 12, padding: '12px 16px 0' }}>
          <LG r={22} style={{ flex: 1, minHeight: 0 }} innerStyle={{ height: '100%' }}>
            <div ref={viewfinderRef} style={{ height: '100%', position: 'relative', overflow: 'hidden', borderRadius: 21, background: 'linear-gradient(160deg,#0d1060 0%,#091448 50%,#160940 100%)' }}>

              {/* Grille */}
              {grid && [33, 66].map(p => <div key={`h${p}`} style={{ position: 'absolute', left: `${p}%`, top: 0, bottom: 0, borderLeft: '1px solid rgba(255,255,255,.12)', zIndex: 3 }} />)}
              {grid && [33, 66].map(p => <div key={`v${p}`} style={{ position: 'absolute', top: `${p}%`, left: 0, right: 0, borderTop: '1px solid rgba(255,255,255,.12)', zIndex: 3 }} />)}

              {/* Flux caméra — toujours dans le DOM, sinon iOS Safari ne rend pas les frames après play() sur display:none */}
              <video ref={videoRef} playsInline muted style={{
                position: 'absolute', inset: 0, width: '100%', height: '100%',
                objectFit: 'cover',
                opacity: active ? 1 : 0,
                zIndex: 1,
              }} />

              {/* Écran vide si pas de caméra */}
              {!active && (
                <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 12, zIndex: 1 }}>
                  <div style={{ fontSize: 40, opacity: .3 }}>📷</div>
                  <span style={{ color: 'rgba(255,255,255,.35)', fontSize: 13, textAlign: 'center', padding: '0 24px' }}>
                    {image ? 'Ouverture de la caméra…' : 'Importez une image ou démarrez la caméra'}
                  </span>
                </div>
              )}

              {/* Calque image superposé */}
              {image && (
                <div style={{
                  position: 'absolute', inset: 0,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  zIndex: 2, pointerEvents: 'none',
                }}>
                  <img src={image} alt="calque" style={{
                    maxWidth: '100%', maxHeight: '100%',
                    objectFit: 'contain',
                    transform: overlayTransform,
                    transformOrigin: 'center',
                    opacity: opacity / 100,
                    transition: 'opacity .12s',
                  }} />
                </div>
              )}

              {/* Crosshair */}
              <div style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%,-50%)', pointerEvents: 'none', zIndex: 4 }}>
                {[-1, 1].map(d => <div key={d} style={{ position: 'absolute', width: 24, height: 1.5, background: 'rgba(255,255,255,.6)', top: -0.75, [d > 0 ? 'left' : 'right']: 8 }} />)}
                {[-1, 1].map(d => <div key={d} style={{ position: 'absolute', height: 24, width: 1.5, background: 'rgba(255,255,255,.6)', left: -0.75, [d > 0 ? 'top' : 'bottom']: 8 }} />)}
                <div style={{ width: 10, height: 10, border: '1.5px solid rgba(255,255,255,.7)', borderRadius: '50%', position: 'absolute', top: -5, left: -5 }} />
              </div>

              {/* Badge statut */}
              <div style={{ position: 'absolute', top: 12, left: 12, zIndex: 5 }}>
                <LG r={16} style={{ display: 'inline-block' }} innerStyle={{ padding: '6px 12px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <div style={{ width: 7, height: 7, borderRadius: '50%', background: active ? '#34d399' : '#f87171', boxShadow: active ? '0 0 8px #34d399' : '0 0 8px #f87171' }} />
                    <span style={{ color: 'white', fontSize: 12, fontWeight: 600 }}>{active ? 'Caméra active' : 'Inactif'}</span>
                  </div>
                </LG>
              </div>

              {/* Badge zoom */}
              <div style={{ position: 'absolute', top: 12, right: 12, zIndex: 5 }}>
                <LG r={14} style={{ display: 'inline-block' }} innerStyle={{ padding: '5px 10px' }}>
                  <span style={{ color: 'rgba(255,255,255,.9)', fontSize: 12, fontWeight: 700 }}>{zoom}%</span>
                </LG>
              </div>

              {/* Hint pinch si image chargée */}
              {image && active && (
                <div style={{ position: 'absolute', bottom: 12, left: '50%', transform: 'translateX(-50%)', zIndex: 5 }}>
                  <LG r={12} style={{ display: 'inline-block' }} innerStyle={{ padding: '4px 10px' }}>
                    <span style={{ color: 'rgba(255,255,255,.5)', fontSize: 10 }}>Pincez pour zoomer</span>
                  </LG>
                </div>
              )}
            </div>
          </LG>

          <LG r={24} innerStyle={{ padding: '18px 16px' }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              <GlassSlider value={opacity} onChange={setOpacity} label="Opacité calque" accent="rgba(160,140,255,1)" />
              <GlassSlider value={zoom} onChange={setZoom} min={40} max={200} label="Zoom" unit="%" accent="rgba(100,200,255,1)" />
              <div style={{ display: 'flex', gap: 8 }}>
                <LG r={14} style={{ flex: 1 }}>
                  <button onClick={() => fileRef.current.click()} style={{ width: '100%', padding: '10px 0', background: 'none', border: 'none', cursor: 'pointer', textAlign: 'center' }}>
                    <div style={{ color: image ? '#a78bfa' : 'rgba(255,255,255,.9)', fontSize: 17, marginBottom: 2 }}>🖼</div>
                    <div style={{ color: image ? '#a78bfa' : 'rgba(255,255,255,.45)', fontSize: 10, fontWeight: 500 }}>{image ? 'Changer' : 'Image'}</div>
                  </button>
                </LG>
                <LG r={14} style={{ flex: 1 }}>
                  <button onClick={() => setRotation(r => (r + 90) % 360)} style={{ width: '100%', padding: '10px 0', background: 'none', border: 'none', cursor: 'pointer', textAlign: 'center' }}>
                    <div style={{ color: 'rgba(255,255,255,.9)', fontSize: 17, marginBottom: 2 }}>↺</div>
                    <div style={{ color: 'rgba(255,255,255,.45)', fontSize: 10, fontWeight: 500 }}>Rotation</div>
                  </button>
                </LG>
                <LG r={14} style={{ flex: 1 }}>
                  <button onClick={() => setGrid(g => !g)} style={{ width: '100%', padding: '10px 0', background: 'none', border: 'none', cursor: 'pointer', textAlign: 'center' }}>
                    <div style={{ color: grid ? '#34d399' : 'rgba(255,255,255,.9)', fontSize: 17, marginBottom: 2 }}>⊞</div>
                    <div style={{ color: grid ? '#34d399' : 'rgba(255,255,255,.45)', fontSize: 10, fontWeight: 500 }}>Grille</div>
                  </button>
                </LG>
                <LG r={14} style={{ flex: 1 }}>
                  <button onClick={() => setMirror(m => !m)} style={{ width: '100%', padding: '10px 0', background: 'none', border: 'none', cursor: 'pointer', textAlign: 'center' }}>
                    <div style={{ color: mirror ? '#34d399' : 'rgba(255,255,255,.9)', fontSize: 17, marginBottom: 2 }}>⤡</div>
                    <div style={{ color: mirror ? '#34d399' : 'rgba(255,255,255,.45)', fontSize: 10, fontWeight: 500 }}>Miroir</div>
                  </button>
                </LG>
              </div>
              <LG r={14} innerStyle={{ padding: '1px' }}>
                <button onClick={active ? stopCamera : startCamera} style={{
                  width: '100%', padding: '13px', borderRadius: 13,
                  background: active
                    ? 'linear-gradient(135deg,rgba(200,60,60,.25),rgba(180,40,40,.15))'
                    : 'linear-gradient(135deg,rgba(50,180,120,.25),rgba(30,160,100,.15))',
                  border: 'none', cursor: 'pointer', color: 'white', fontSize: 14, fontWeight: 600,
                }}>
                  {active ? '⏸ Suspendre caméra' : '▶ Démarrer caméra'}
                </button>
              </LG>
            </div>
          </LG>
          <input ref={fileRef} type="file" accept="image/*" style={{ display: 'none' }}
            onChange={handleImageImport} />
        </div>
      );
    }

    /* ── Tab: Couleurs ── */
    const PIGS = [
      { code: 'PB29',  name: 'Outremer',     color: '#2244bb' },
      { code: 'PW6',   name: 'Blanc Titane',  color: '#dddbd5' },
      { code: 'PY153', name: 'Jaune Nickel',  color: '#c89a28' },
      { code: 'PR101', name: 'Oxyde Rouge',   color: '#8b3a2a' },
      { code: 'PBk11', name: 'Noir Oxyde',    color: '#252520' },
      { code: 'PG7',   name: 'Vert Phtalo',   color: '#1a7a5e' },
      { code: 'PV19',  name: 'Quinacridone',  color: '#8b2d6e' },
      { code: 'PO20',  name: 'Cadmium Org.',  color: '#c4521a' },
    ];

    function hexToRgb(hex) {
      return [parseInt(hex.slice(1, 3), 16), parseInt(hex.slice(3, 5), 16), parseInt(hex.slice(5, 7), 16)];
    }
    function mixColors(pigs) {
      const active = pigs.filter(p => p.pct > 0);
      if (!active.length) return '#444';
      let r = 0, g = 0, b = 0, t = 0;
      active.forEach(p => {
        const [pr, pg, pb] = hexToRgb(p.color);
        r += Math.sqrt(pr * pr * p.pct); g += Math.sqrt(pg * pg * p.pct); b += Math.sqrt(pb * pb * p.pct); t += p.pct;
      });
      const h = v => Math.round((v / t) ** 2).toString(16).padStart(2, '0');
      return `#${h(r)}${h(g)}${h(b)}`;
    }

    function TabCouleurs() {
      const [pigs, setPigs] = useState(PIGS.map((p, i) => ({ ...p, pct: i === 0 ? 40 : i === 1 ? 35 : i === 2 ? 25 : 0 })));
      const [sel, setSel] = useState(null);
      const mixed = mixColors(pigs);
      const total = pigs.reduce((s, p) => s + p.pct, 0);
      const set = (code, v) => setPigs(prev => prev.map(p => p.code === code ? { ...p, pct: Math.max(0, Math.min(100, v)) } : p));

      return (
        <div className="screen" style={{ height: '100%', display: 'flex', flexDirection: 'column', gap: 10, padding: '12px 16px 0', overflowY: 'auto' }}>
          <LG r={22} innerStyle={{ padding: 16 }}>
            <div style={{ display: 'flex', gap: 14, alignItems: 'center' }}>
              <div style={{
                width: 76, height: 76, borderRadius: '50%', flexShrink: 0,
                background: `radial-gradient(circle at 38% 32%, ${mixed}ff, ${mixed}99)`,
                boxShadow: `0 0 40px ${mixed}88, 0 6px 20px rgba(0,0,0,.5), inset 0 2px 4px rgba(255,255,255,.35)`,
                position: 'relative', overflow: 'hidden',
              }}>
                <div style={{ position: 'absolute', top: '8%', left: '10%', width: '50%', height: '42%', borderRadius: '60% 40% 50%', background: 'rgba(255,255,255,.3)', filter: 'blur(4px)' }} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ color: 'rgba(255,255,255,.45)', fontSize: 11, fontWeight: 600, letterSpacing: 1.5, textTransform: 'uppercase', marginBottom: 4 }}>Mélange</div>
                <div style={{ color: 'white', fontSize: 20, fontWeight: 800, fontFamily: 'monospace', letterSpacing: 1 }}>{mixed.toUpperCase()}</div>
                <div style={{ color: 'rgba(255,255,255,.4)', fontSize: 12, marginTop: 4 }}>
                  {total > 0 ? `${total} parts · ${pigs.filter(p => p.pct > 0).length} pigments` : 'Aucun pigment sélectionné'}
                </div>
              </div>
            </div>
            {total > 0 && (
              <div style={{ marginTop: 14, display: 'flex', gap: 2, height: 5, borderRadius: 3, overflow: 'hidden' }}>
                {pigs.filter(p => p.pct > 0).map(p => (
                  <div key={p.code} style={{ flex: p.pct, background: p.color, transition: 'flex .3s' }} />
                ))}
              </div>
            )}
          </LG>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
            {pigs.map(p => (
              <LG key={p.code} r={18} style={{ cursor: 'pointer' }}>
                <div style={{ padding: '11px 13px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 11 }} onClick={() => setSel(sel === p.code ? null : p.code)}>
                    <PaintBlob color={p.color} size={40} active={p.pct > 0} />
                    <div style={{ flex: 1 }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                        <span style={{ color: 'white', fontSize: 14, fontWeight: 600 }}>{p.name}</span>
                        <span style={{ color: 'rgba(255,255,255,.85)', fontSize: 13, fontWeight: 700 }}>
                          {p.pct > 0 ? `${Math.round((p.pct / Math.max(total, 1)) * 100)}%` : '—'}
                        </span>
                      </div>
                      <span style={{ color: 'rgba(255,255,255,.35)', fontSize: 11, fontFamily: 'monospace' }}>{p.code}</span>
                    </div>
                  </div>
                  {sel === p.code && (
                    <div style={{ marginTop: 12, display: 'flex', alignItems: 'center', gap: 10 }}>
                      <button onClick={() => set(p.code, p.pct - 5)} style={{ width: 32, height: 32, borderRadius: '50%', background: 'rgba(255,255,255,.1)', border: '1px solid rgba(255,255,255,.2)', color: 'white', fontSize: 18, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>−</button>
                      <div style={{ flex: 1, paddingTop: 4 }}><GlassSlider value={p.pct} onChange={v => set(p.code, v)} accent={p.color} /></div>
                      <button onClick={() => set(p.code, p.pct + 5)} style={{ width: 32, height: 32, borderRadius: '50%', background: 'rgba(255,255,255,.1)', border: '1px solid rgba(255,255,255,.2)', color: 'white', fontSize: 18, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>+</button>
                    </div>
                  )}
                </div>
              </LG>
            ))}
          </div>
          <div style={{ height: 16 }} />
        </div>
      );
    }

    /* ── Tab: Bibliothèque ── */
    const REFS = [
      { id: 1, title: 'Nuit étoilée',     artist: 'Van Gogh',  tags: ['bleu','nuit','ciel'],     palette: ['#1a237e','#283593','#ffd54f','#fff9c4','#4a148c'] },
      { id: 2, title: 'La Joconde',        artist: 'Da Vinci',  tags: ['portrait','sfumato'],     palette: ['#4e342e','#6d4c41','#8d6e63','#d7ccc8','#795548'] },
      { id: 3, title: 'Impression Soleil', artist: 'Monet',     tags: ['impressionnisme','orange'],palette: ['#bf360c','#e64a19','#ff7043','#4fc3f7','#b0bec5'] },
      { id: 4, title: 'Guernica',          artist: 'Picasso',   tags: ['cubisme','noir'],         palette: ['#212121','#424242','#757575','#bdbdbd','#eeeeee'] },
      { id: 5, title: 'Les Tournesols',    artist: 'Van Gogh',  tags: ['jaune','fleurs'],         palette: ['#f57f17','#f9a825','#fdd835','#fff176','#795548'] },
      { id: 6, title: 'La Persistance',    artist: 'Dali',      tags: ['surréalisme','désert'],   palette: ['#e65100','#ef6c00','#f57c00','#1565c0','#0d47a1'] },
    ];

    function TabBibliotheque() {
      const [q, setQ] = useState('');
      const [active, setActive] = useState(null);
      const filtered = REFS.filter(r =>
        !q || r.title.toLowerCase().includes(q.toLowerCase()) ||
        r.artist.toLowerCase().includes(q.toLowerCase()) ||
        r.tags.some(t => t.includes(q.toLowerCase()))
      );

      return (
        <div className="screen" style={{ height: '100%', display: 'flex', flexDirection: 'column', gap: 10, padding: '12px 16px 0' }}>
          <LG r={18} innerStyle={{ padding: '11px 14px', display: 'flex', alignItems: 'center', gap: 9 }}>
            <svg width="15" height="15" fill="none" stroke="rgba(255,255,255,.45)" strokeWidth="2" strokeLinecap="round"><circle cx="6.5" cy="6.5" r="4.5" /><path d="M11 11l3 3" /></svg>
            <input value={q} onChange={e => setQ(e.target.value)}
              placeholder="Rechercher œuvres, artistes…"
              style={{ flex: 1, background: 'none', border: 'none', outline: 'none', color: 'white', fontSize: 14, fontFamily: 'inherit' }}
            />
            {q && <button onClick={() => setQ('')} style={{ background: 'none', border: 'none', color: 'rgba(255,255,255,.4)', cursor: 'pointer', fontSize: 18 }}>×</button>}
          </LG>

          <div style={{ flex: 1, overflowY: 'auto' }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 9, paddingBottom: 14 }}>
              {filtered.map(ref => (
                <LG key={ref.id} r={20} style={{ cursor: 'pointer' }}>
                  <div onClick={() => setActive(active === ref.id ? null : ref.id)}>
                    <div style={{ height: 80, display: 'flex', borderRadius: '19px 19px 0 0', overflow: 'hidden', position: 'relative' }}>
                      {ref.palette.map((c, i) => (
                        <div key={i} style={{ flex: 1, background: c, position: 'relative' }}>
                          <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(circle at 40% 35%,rgba(255,255,255,.18),transparent 65%)' }} />
                        </div>
                      ))}
                      <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(180deg,transparent 40%,rgba(5,2,30,.65) 100%)' }} />
                    </div>
                    <div style={{ padding: '9px 11px' }}>
                      <div style={{ color: 'white', fontSize: 12, fontWeight: 700 }}>{ref.title}</div>
                      <div style={{ color: 'rgba(255,255,255,.45)', fontSize: 11, marginTop: 2 }}>{ref.artist}</div>
                    </div>
                  </div>
                  {active === ref.id && (
                    <div style={{ padding: '0 11px 11px', borderTop: '1px solid rgba(255,255,255,.09)', paddingTop: 10 }}>
                      <div style={{ display: 'flex', gap: 5, marginBottom: 9 }}>
                        {ref.palette.map((c, i) => <PaintBlob key={i} color={c} size={26} />)}
                      </div>
                      <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap', marginBottom: 10 }}>
                        {ref.tags.map(t => (
                          <span key={t} style={{ padding: '3px 8px', borderRadius: 8, background: 'rgba(255,255,255,.09)', border: '1px solid rgba(255,255,255,.13)', color: 'rgba(255,255,255,.6)', fontSize: 10, fontWeight: 500 }}>{t}</span>
                        ))}
                      </div>
                      <LG r={11} innerStyle={{ padding: '1px' }}>
                        <button style={{ width: '100%', padding: '9px', borderRadius: 10, background: 'linear-gradient(135deg,rgba(100,80,220,.25),rgba(80,60,180,.15))', border: 'none', cursor: 'pointer', color: 'white', fontSize: 12, fontWeight: 600 }}>
                          Utiliser comme référence →
                        </button>
                      </LG>
                    </div>
                  )}
                </LG>
              ))}
            </div>
          </div>
        </div>
      );
    }

    /* ── Tab Bar ── */
    function TabBar({ tab, setTab }) {
      const tabs = [
        { id: 'calque', label: 'Calque', svg: (
          <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 22 22">
            <rect x="3" y="3" width="16" height="16" rx="3"/>
            <path d="M3 9.5h16M3 13.5h16" strokeWidth="1.2" strokeDasharray="3 2"/>
            <circle cx="11" cy="11.5" r="2.5" fill="currentColor" stroke="none" opacity=".8"/>
          </svg>
        )},
        { id: 'couleurs', label: 'Couleurs', svg: (
          <svg width="20" height="20" viewBox="0 0 22 22">
            <circle cx="8" cy="9" r="5" fill="currentColor" opacity=".55"/>
            <circle cx="14" cy="9" r="5" fill="currentColor" opacity=".55"/>
            <circle cx="11" cy="14" r="5" fill="currentColor" opacity=".55"/>
          </svg>
        )},
        { id: 'biblio', label: 'Biblio.', svg: (
          <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" viewBox="0 0 22 22">
            <rect x="3" y="4" width="16" height="14" rx="2.5"/>
            <path d="M3 9h16M8 4v5"/>
            <rect x="5.5" y="11.5" width="4" height="4" rx="1" fill="currentColor" stroke="none" opacity=".7"/>
            <path d="M12.5 12h4M12.5 15h4" strokeWidth="1.3"/>
          </svg>
        )},
      ];
      const activeIdx = tabs.findIndex(t => t.id === tab);
      const pct = (100 / tabs.length) * activeIdx;

      return (
        <div style={{ padding: '6px 16px 8px' }}>
          <LG r={24}>
            <div style={{ display: 'flex', padding: '4px', gap: 0, position: 'relative' }}>
              <div style={{
                position: 'absolute', top: 4, bottom: 4,
                left: `calc(${pct}% + 4px)`,
                width: `calc(${100 / tabs.length}% - 8px)`,
                borderRadius: 20,
                background: 'linear-gradient(160deg,rgba(255,255,255,.18) 0%,rgba(255,255,255,.07) 100%)',
                boxShadow: 'inset 0 1px 0 rgba(255,255,255,.28), 0 2px 12px rgba(0,0,30,.45)',
                backdropFilter: 'blur(20px)', WebkitBackdropFilter: 'blur(20px)',
                transition: 'left .35s cubic-bezier(0.34,1.56,0.64,1)',
                pointerEvents: 'none', zIndex: 0,
              }} />
              {tabs.map(t => (
                <button key={t.id} onClick={() => setTab(t.id)} style={{
                  flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
                  padding: '8px 4px', borderRadius: 20, cursor: 'pointer',
                  border: 'none', outline: 'none', background: 'transparent',
                  color: tab === t.id ? 'white' : 'rgba(255,255,255,.38)',
                  transition: 'color .2s', position: 'relative', zIndex: 1,
                }}>
                  <div style={{ transform: tab === t.id ? 'scale(1.12)' : 'scale(1)', transition: 'transform .35s cubic-bezier(0.34,1.56,0.64,1)' }}>
                    {t.svg}
                  </div>
                  <span style={{ fontSize: 10.5, fontWeight: tab === t.id ? 700 : 400, letterSpacing: .2 }}>{t.label}</span>
                </button>
              ))}
            </div>
          </LG>
        </div>
      );
    }

    /* ── Root App ── */
    function App() {
      const [tab, setTab] = useState(() => localStorage.getItem('pointure_tab') || 'calque');
      const switchTab = t => { setTab(t); localStorage.setItem('pointure_tab', t); };

      return (
        <div style={{ position: 'fixed', inset: 0, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
          {/* Animated background */}
          <div style={{ position: 'fixed', inset: 0, zIndex: 0 }}>
            <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(160deg,#0e0b3d 0%,#17108a 20%,#0a1460 40%,#1a0960 65%,#07082a 100%)' }} />
            {[
              { w: 340, h: 300, t: -80, l: -80, c: '#3b1dc8', d: '0s' },
              { w: 280, h: 280, t: '35%', r: -70, c: '#1a3dd4', d: '4s' },
              { w: 240, h: 240, b: '18%', l: '15%', c: '#6b1fa8', d: '8s' },
              { w: 200, h: 200, t: '20%', l: '30%', c: '#0d3fa8', d: '2s' },
            ].map((b, i) => (
              <div key={i} style={{
                position: 'absolute', width: b.w, height: b.h, borderRadius: '50%',
                background: b.c, filter: 'blur(60px)', opacity: .7,
                top: b.t, left: b.l, right: b.r, bottom: b.b,
                animation: `blobDrift 10s ease-in-out ${b.d} infinite`,
              }} />
            ))}
          </div>

          {/* App shell */}
          <div style={{ position: 'relative', zIndex: 1, display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0, paddingTop: 'env(safe-area-inset-top,0px)' }}>
            {/* Header */}
            <div style={{ padding: '12px 18px 8px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0 }}>
              <div>
                <div style={{ color: 'rgba(255,255,255,.38)', fontSize: 10, fontWeight: 700, letterSpacing: 2.5, textTransform: 'uppercase' }}>Application</div>
                <div style={{ color: 'white', fontSize: 28, fontWeight: 800, letterSpacing: -.8, lineHeight: 1.1 }}>Pointure</div>
              </div>
              <LG r={22} innerStyle={{ padding: '7px 14px' }}>
                <span style={{ color: 'rgba(255,255,255,.8)', fontSize: 13, fontWeight: 500 }}>v0.1 PWA</span>
              </LG>
            </div>

            {/* Screen content — défile */}
            <div style={{ flex: 1, overflowY: 'auto', overflowX: 'hidden', minHeight: 0, WebkitOverflowScrolling: 'touch' }}>
              {tab === 'calque'   && <TabCalque />}
              {tab === 'couleurs' && <TabCouleurs />}
              {tab === 'biblio'   && <TabBibliotheque />}
            </div>

            {/* Tab bar — juste au-dessus de la barre système Apple */}
            <div style={{ flexShrink: 0, borderTop: '1px solid rgba(255,255,255,0.06)' }}>
              <TabBar tab={tab} setTab={switchTab} />
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
